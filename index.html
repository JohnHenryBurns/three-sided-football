<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Three-Sided World Cup — Spain · Argentina · England</title>
<style>
  :root{
    --bg:#0d1410; --panel:#152019; --panel-edge:#233529;
    --chalk:rgba(255,255,255,.85); --ink:#e8efe9; --ink-dim:#8fa596;
    --esp:#e63946; --arg:#6fb7e3; --eng:#f2f2f2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  /* Everything scales from this: bigger screens (in CSS px) get bigger type automatically */
  html{font-size:clamp(14px, 2.0vh + 0.4vw, 20px)}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Barlow Condensed","Arial Narrow",system-ui,sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
  }
  header{
    display:flex; align-items:center; gap:.6rem; flex-wrap:wrap;
    padding:.35rem .6rem; border-bottom:1px solid var(--panel-edge);
  }
  h1{font-size:1.05rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
  h1 span{color:var(--ink-dim);font-weight:400}
  .clock{font-size:1.05rem;font-variant-numeric:tabular-nums;letter-spacing:.08em}
  .controls{display:flex;align-items:center;gap:.55rem;margin-left:auto;flex-wrap:wrap}
  button{
    font-family:inherit;font-size:.85rem;letter-spacing:.07em;text-transform:uppercase;
    background:var(--panel);color:var(--ink);border:1px solid var(--panel-edge);
    border-radius:8px;padding:.4rem .8rem;cursor:pointer;min-height:2.1rem;
  }
  button:hover{border-color:var(--ink-dim)}
  button:focus-visible,input:focus-visible{outline:2px solid var(--arg);outline-offset:2px}
  label{font-size:.75rem;color:var(--ink-dim);letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:.3rem;white-space:nowrap}
  button .ic{font-size:.95em}
  button .lbl,button .val{margin-left:.3rem}
  .icOnly{display:none}
  input[type=range]{accent-color:var(--arg);width:4.5rem;height:1.4rem}
  input[type=checkbox]{accent-color:var(--esp);width:1rem;height:1rem}
  select{font-family:inherit;font-size:.78rem;background:var(--panel);color:var(--ink);
    border:1px solid var(--panel-edge);border-radius:6px;padding:.2rem .3rem}
  .card.out{opacity:.45;filter:grayscale(.6)}
  .card{cursor:pointer;-webkit-tap-highlight-color:transparent}
  .coachBtn{margin-left:.35rem;font-size:.68rem;padding:.12rem .4rem;min-height:auto;
    border-radius:5px;background:rgba(0,0,0,.3);flex:none}
  .card.coached .coachBtn{background:var(--team);color:#10150f;font-weight:700}
  .card.activeC{animation:coachPulse 1.3s ease-in-out infinite}
  @keyframes coachPulse{0%,100%{box-shadow:0 0 0 0 var(--team)}50%{box-shadow:0 0 13px 2px var(--team)}}
  .hunt .ord{color:#ffd166}
  @media (prefers-reduced-motion:reduce){ .card.activeC{animation:none;box-shadow:0 0 10px 1px var(--team)} }

  /* The pitch gets a guaranteed share of width; the SVG letterboxes itself inside it */
  .grid{
    flex:1; min-height:0;
    display:grid; grid-template-columns:minmax(0,2.2fr) minmax(0,1fr);
    gap:.5rem; padding:.5rem; width:100%; margin:0 auto;
  }
  /* broadcast HUD floats over the pitch */
  #hud{position:absolute;top:.35rem;left:.35rem;right:.35rem;z-index:5;
    display:flex;gap:.35rem;justify-content:center;align-items:flex-start;flex-wrap:wrap;pointer-events:none}
  .hudclock{background:rgba(8,14,10,.78);border:1px solid var(--panel-edge);border-radius:8px;
    padding:.28rem .45rem;font-size:.9rem;font-variant-numeric:tabular-nums;letter-spacing:.04em;
    pointer-events:auto;align-self:stretch;display:flex;align-items:center;white-space:nowrap}
  .chips{display:flex;gap:.35rem;flex-wrap:wrap;justify-content:center}
  .chips .card{pointer-events:auto;background:rgba(8,14,10,.78);margin:0;padding:.2rem .4rem;
    border-radius:8px;min-width:4.4rem}
  .chips .card .name{font-size:.72rem;gap:.25rem}
  .chips .card .pts{font-size:1.1rem}
  .chips .card .con{font-size:.56rem}
  .chips .card .hunt{font-size:.62rem;margin-top:0}
  .chips .card .stambar{margin-top:.18rem;height:.18rem}
  .chips .card .row{margin-top:0;gap:.3rem}
  .chips .coachBtn{font-size:.58rem;padding:.08rem .3rem}
  aside{
    background:var(--panel); border:1px solid var(--panel-edge); border-radius:10px;
    padding:.5rem; overflow-y:auto; min-height:0;
  }
  .stage{position:relative; min-width:0; min-height:0}
  .stage svg{position:absolute; inset:0; width:100%; height:100%; display:block}

  .card{
    border:1px solid var(--panel-edge); border-left:.28rem solid var(--team);
    border-radius:8px; padding:.4rem .55rem; margin-bottom:.5rem; background:rgba(0,0,0,.15);
    transition:box-shadow .3s;
  }
  .card.flash{box-shadow:0 0 16px var(--team)}
  .card .name{font-size:1rem;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:.35rem}
  .card .name .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .card .dot{width:.6rem;height:.6rem;border-radius:50%;background:var(--team);flex:none}
  .card .row{display:flex;align-items:baseline;gap:.5rem;margin-top:.1rem}
  .card .pts{font-size:1.7rem;font-weight:600;font-variant-numeric:tabular-nums;line-height:1}
  .card .con{font-size:.75rem;color:var(--ink-dim);font-variant-numeric:tabular-nums}
  .card .hunt{font-size:.8rem;color:var(--ink-dim);margin-top:.1rem}
  .card .hunt b{color:var(--hunt-color)}
  .stambar{height:.3rem;border-radius:.15rem;background:rgba(255,255,255,.12);margin-top:.3rem;overflow:hidden}
  .stambar i{display:block;height:100%;background:var(--stam-color,#7ec97e);width:100%;transition:width .4s}
  .fire{font-size:.7rem;color:#ffb547;letter-spacing:.05em;margin-top:.1rem;min-height:.85rem}

  .feedTitle{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:.3rem;position:sticky;top:-.5rem;background:var(--panel);padding:.25rem 0}
  .feed div{font-size:.95rem;line-height:1.4;padding:.28rem 0;border-bottom:1px solid rgba(255,255,255,.06)}
  .feed div:first-of-type{color:#fff}
  .feed .t{font-variant-numeric:tabular-nums;color:var(--ink-dim);margin-right:.3rem;font-size:.7rem}
  .feed .goal{color:#ffd166}
  .tm{font-weight:600}

  /* Momentum flame on the scorecard */
  .flame{display:none;margin-left:auto;font-size:1.05rem}
  .card.hot{box-shadow:0 0 14px rgba(255,181,71,.45)}
  .card.hot .flame{display:inline-block;animation:flick .6s infinite alternate}
  @keyframes flick{from{transform:scale(1) rotate(-4deg)}to{transform:scale(1.3) rotate(5deg)}}

  /* Goal celebration overlay */
  #celebrate{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(6,10,8,.6);z-index:50;pointer-events:none}
  #celebrate.show{display:flex}
  #celebrate .cele{pointer-events:auto}
  #setup{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(6,10,8,.75);z-index:60}
  #setup.show{display:flex}
  .setupCard{border-color:var(--arg);min-width:min(22rem,90vw)}
  .ghlink{display:block;margin-top:.8rem;font-size:.72rem;color:var(--ink-dim);
    text-decoration:none;letter-spacing:.08em;text-transform:uppercase}
  .ghlink:hover{color:var(--ink);text-decoration:underline}
  .setupCard .big{font-size:2rem}
  .formrow{display:flex;flex-direction:column;align-items:stretch;gap:.3rem;margin-top:.9rem;font-size:.95rem;text-align:left}
  .formrow label{font-size:.78rem;color:var(--ink-dim);letter-spacing:.08em}
  .formrow select{width:100%;font-size:.95rem;padding:.45rem .5rem}
  .formrow.chk{flex-direction:row;justify-content:space-between;align-items:center}
  .cele button{margin-top:.8rem;font-size:.9rem;border-color:var(--cele,var(--arg))}
  .cele{max-height:88vh;overflow-y:auto}
  .statsgrid{display:grid;grid-template-columns:auto repeat(4,minmax(2.6rem,auto));gap:.18rem .7rem;
    font-size:.95rem;margin:.7rem auto 0;width:fit-content;text-align:right;font-variant-numeric:tabular-nums}
  .statsgrid .tn{text-align:left;font-weight:600}
  .statsgrid .hd{color:var(--ink-dim);font-size:.8rem;letter-spacing:.08em}
  .hl{font-size:.92rem;color:var(--ink-dim);margin-top:.55rem;line-height:1.6}
  .potm{font-size:1.05rem;color:#ffd166;margin-top:.55rem}
  .cele{background:var(--panel);border:3px solid var(--cele,#fff);border-radius:18px;
    padding:1.5rem 2.5rem;text-align:center;max-width:92vw;min-width:min(26rem,88vw);
    box-shadow:0 0 70px var(--cele,#fff);animation:pop .35s ease-out}
  .cele .big{font-size:clamp(1.5rem,7vw,3.1rem);font-weight:600;color:#ffd166;letter-spacing:.04em;line-height:1.1;overflow-wrap:break-word}
  .cele .who{font-size:2.1rem;margin-top:.3rem}
  .cele .who b{color:var(--cele)}
  .cele .sub{font-size:1.25rem;color:var(--ink-dim);margin-top:.45rem}
  .cele .fireline{font-size:1.2rem;color:#ffb547;margin-top:.35rem;min-height:1.35rem}
  @keyframes pop{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}
  .confetti{position:absolute;top:-8vh;width:.5rem;height:.85rem;border-radius:2px;opacity:.95;
    animation:fall 1.8s cubic-bezier(.3,.6,.6,1) forwards}
  @keyframes fall{to{transform:translateY(120vh) rotate(680deg);opacity:.65}}
  @media (prefers-reduced-motion:reduce){ .cele{animation:none} .card.hot .flame{animation:none} .confetti{display:none} }

  /* Portrait phones: stack, pitch on top with the HUD overlaid */
  @media (orientation:portrait){
    .cele{padding:1.2rem 1.1rem}
    body{overflow:auto}
    .grid{grid-template-columns:1fr; grid-auto-rows:auto}
    .stage{order:-1; height:60vh}
    #hud{flex-wrap:nowrap;overflow-x:auto;justify-content:flex-start;scrollbar-width:none;gap:.25rem}
    .hudclock{font-size:.72rem;padding:.2rem .32rem}
    .chips{flex-wrap:nowrap;gap:.25rem}
    .chips .card{min-width:3.5rem;padding:.14rem .3rem}
    .chips .card .con{display:none}
    .chips .card .pts{font-size:.9rem}
    .chips .card .name{font-size:.64rem}
    .chips .card .hunt{font-size:.56rem}
    .chips .coachBtn{padding:.05rem .22rem;font-size:.54rem}
    aside.comm{max-height:32vh}
    header{padding:.25rem .5rem;gap:.3rem;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none}
    h1{font-size:.8rem}
    h1 span{display:none}
    .controls{gap:.3rem;flex-wrap:nowrap}
    button{padding:.3rem .45rem;min-height:1.9rem;font-size:.82rem}
    button .lbl{display:none}
    button .lbl+.val,button .val{margin-left:.25rem}
    label .lbl{display:none}
    .icOnly{display:inline}
    label{font-size:.68rem}
  }
  @media (max-width:1100px){ h1 span{display:none} }
  @media (prefers-reduced-motion:reduce){ .card,.stambar i{transition:none} }
</style>
</head>
<body>
<header>
  <h1>Three-Sided World Cup <span>/ ESP · ARG · ENG</span></h1>
  <div class="controls">
    <button id="btnPlay" title="Pause / Play"><span class="ic">⏸</span><span class="lbl">Pause</span></button>
    <button id="btnReset" title="Reset match"><span class="ic">↺</span><span class="lbl">Reset</span></button>
    <button id="btnZoom" title="Zoom"><span class="ic">🔍</span><span class="val" id="zoomVal">2.3×</span></button>
    <button id="btnSpeed" title="Speed"><span class="ic">⏩</span><span class="val" id="speedVal">1×</span></button>
    <label title="Spoken narrator"><input id="voiceToggle" type="checkbox"> <span class="lbl">Narrator</span><span class="ic icOnly">🎙</span></label>
  </div>
</header>

<div class="grid">
  <div class="stage">
    <div id="hud">
      <div class="hudclock" id="clock">00:00</div>
      <div id="scoreboard" class="chips" aria-label="Scoreboard"></div>
    </div>
    <svg id="pitch" viewBox="0 0 900 810" role="img" aria-label="Hexagonal pitch, three teams"></svg>
  </div>
  <aside class="comm" aria-label="Commentary">
    <div class="feedTitle">Play-by-play</div>
    <div class="feed" id="feed"></div>
  </aside>
</div>

<div id="celebrate"><div id="confettiBox"></div><div class="cele" id="celeCard"></div></div>

<div id="setup"><div class="cele setupCard">
  <div class="big">⚽ MATCH SETUP</div>
  <div class="formrow"><label for="setRules">Scoring</label><select id="setRules">
    <option value="points">±1 points (scorer +1, conceder −1)</option>
    <option value="conceded">Classic — fewest conceded wins</option>
  </select></div>
  <div class="formrow"><label for="setLen">Match length</label><select id="setLen">
    <option value="60" selected>1 minute — blitz</option>
    <option value="180">3 minutes</option>
    <option value="300">5 minutes</option>
    <option value="600">10 minutes</option>
  </select></div>
  <div class="formrow chk"><label for="setMom">Underdog fire</label><input id="setMom" type="checkbox" checked></div>
  <button id="btnStart">Kick off</button>
  <a class="ghlink" href="https://github.com/JohnHenryBurns/three-sided-football" target="_blank" rel="noopener">⚙ view on GitHub</a>
</div></div>

<script>
"use strict";
// ---------- Teams & rosters (2026 WC squads) ----------
const TEAMS=[
  {name:"Spain", short:"ESP", color:"#e63946", accent:"#f7c948",
   roster:["Unai Simón","Laporte","Cucurella","Rodri","Lamine Yamal"]},
  {name:"Argentina", short:"ARG", color:"#6fb7e3", accent:"#ffffff",
   roster:["Dibu Martínez","Romero","Tagliafico","Enzo Fernández","Messi"]},
  {name:"England", short:"ENG", color:"#f2f2f2", accent:"#cf1020",
   roster:["Pickford","Stones","Guéhi","Bellingham","Kane"]},
];
const ROLES=["K","D","D","M","F"];

// ---------- Geometry ----------
const CX=450, CY=405, R=340;
const V=[]; for(let k=0;k<6;k++){const a=(-90+60*k)*Math.PI/180; V.push({x:CX+R*Math.cos(a), y:CY+R*Math.sin(a)});}
const EDGES=[];
for(let k=0;k<6;k++){
  const p1=V[k], p2=V[(k+1)%6];
  const mx=(p1.x+p2.x)/2, my=(p1.y+p2.y)/2;
  const len=Math.hypot(p2.x-p1.x,p2.y-p1.y);
  const ux=(p2.x-p1.x)/len, uy=(p2.y-p1.y)/len;
  let nx=CX-mx, ny=CY-my; const nl=Math.hypot(nx,ny); nx/=nl; ny/=nl;
  EDGES.push({p1,p2,mx,my,len,ux,uy,nx,ny,goal:(k%2===0)});
}
const GOAL_EDGE=[0,2,4], GOAL_HALF=0.21;
const goalCenter=t=>{const e=EDGES[GOAL_EDGE[t]];return {x:e.mx,y:e.my};};
const dist=(a,b)=>Math.hypot(a.x-b.x,a.y-b.y);

// ---------- State ----------
let matchLen=60;       // game-time seconds until full-time resolution (blitz default)
let stats, goalsLog, notes=[], resumeAt=0, goldenScorer=null;
let players=[], ball, score, conceded, scored, targets, clockSec, running=true, speed=1;
let phase="regulation", out=[false,false,false], otGolden=false, scoreMode="points";
let coached=[false,false,false], coachTarget=[null,null,null], activeCoach=null;
let boostUntil=[0,0,0], momentumOn=true;
let lastPossessTeam=null, lastPossessComment=-99, lastFatigueComment=0, lastColorComment=0;
const feedEl=document.getElementById("feed"), feed=[];

function formation(t){
  const g=goalCenter(t), e=EDGES[GOAL_EDGE[t]];
  const ax=(CX-g.x), ay=(CY-g.y); const al=Math.hypot(ax,ay);
  const fx=ax/al, fy=ay/al, px=e.ux, py=e.uy;
  return [
    {role:"K", x:g.x+fx*16,       y:g.y+fy*16},
    {role:"D", x:g.x+fx*80+px*70, y:g.y+fy*80+py*70},
    {role:"D", x:g.x+fx*80-px*70, y:g.y+fy*80-py*70},
    {role:"M", x:g.x+fx*170+px*40,y:g.y+fy*170+py*40},
    {role:"F", x:g.x+fx*250-px*30,y:g.y+fy*250-py*30},
  ];
}
function tm(t){return `<span class="tm" style="color:${TEAMS[t].color}">${TEAMS[t].name}</span>`;}
function pick(a){return a[Math.floor(Math.random()*a.length)];}

function resetMatch(){
  players=[]; score=[0,0,0]; conceded=[0,0,0]; scored=[0,0,0]; clockSec=0; feed.length=0;
  phase="regulation"; out=[false,false,false]; otGolden=false;
  coached=[false,false,false]; coachTarget=[null,null,null]; activeCoach=null;
  stats={shots:[0,0,0],saves:[0,0,0],tackles:[0,0,0],poss:[0,0,0]};
  goalsLog=[]; goldenScorer=null;
  notes.forEach(n=>n.e.remove()); notes=[];
  pings.forEach(pg=>pg.e.remove()); pings=[];
  boostUntil=[0,0,0]; lastPossessTeam=null; lastPossessComment=-99; lastFatigueComment=0; lastColorComment=0;
  for(let t=0;t<3;t++) formation(t).forEach((f,i)=>players.push(
    {team:t,role:f.role,name:TEAMS[t].roster[i],x:f.x,y:f.y,vx:0,vy:0,stamina:1,
     k1:0.64+Math.random()*0.10, k2:0.82+Math.random()*0.16,  // unique spring constants
     hx:0,hy:0, goals:0,tackles:0,saves:0}));                                             // smoothed heading for ball carry
  ball={x:CX,y:CY,vx:0,vy:0,owner:null,lastTouch:null,lastKicker:null,isShot:false,noClaim:null,noClaimF:0,
    touchT:0,strayer:null,strayF:0,z:0,zv:0};
  computeTargets();
  const first=Math.floor(Math.random()*3);
  kickoff(first);
  say(`We're underway on the hex! ${tm(0)}, ${tm(1)} and ${tm(2)} — one ball, two enemies each. ${tm(first)} get us started.`,true);
  renderScore();
}

function kickoff(toTeam){
  let i=0;
  for(let t=0;t<3;t++){ formation(t).forEach(f=>{const p=players[i++]; p.x=f.x;p.y=f.y;p.vx=0;p.vy=0;}); }
  ball.x=CX; ball.y=CY; ball.vx=0; ball.vy=0; ball.owner=null; ball.noClaim=null; ball.isShot=false;
  ball.touchT=0; ball.strayer=null; ball.strayF=0; ball.z=0; ball.zv=0;
  const fwd=players.find(p=>p.team===toTeam&&p.role==="F");
  fwd.x=CX-8; fwd.y=CY; ball.owner=fwd; ball.lastTouch=toTeam;
  spawnNote(CX,CY-46,"kick-off!",TEAMS[toTeam].color,TEAMS[toTeam].accent);
}

// ---------- Diplomacy & ranking ----------
// rating: higher = doing better, under either scoring mode
function rating(t){ return scoreMode==="conceded" ? -conceded[t] : score[t]; }
// full ranking: rating first, then FIFA-style tiebreak on goals scored
function rankCmp(a,b){ return (rating(b)-rating(a)) || (scored[b]-scored[a]); }
function aliveTeams(){ return [0,1,2].filter(t=>!out[t]); }

function computeTargets(){
  const old=targets?targets.slice():null;
  targets=[];
  for(let t=0;t<3;t++){
    if(out[t]){ targets[t]=null; continue; }
    if(coached[t]&&coachTarget[t]!==null&&out[coachTarget[t]]) coachTarget[t]=null; // order died with the team
    if(coached[t]&&coachTarget[t]!==null){ targets[t]=coachTarget[t]; continue; }   // orders are orders
    const others=aliveTeams().filter(o=>o!==t);
    if(!others.length){ targets[t]=null; continue; }
    others.sort((a,b)=>(rating(b)-rating(a))||(conceded[a]-conceded[b]));
    targets[t]=others[0];
  }
  if(old){ for(let t=0;t<3;t++) if(targets[t]!==null&&old[t]!==targets[t]&&old[t]!==undefined&&!coached[t])
    say(pick([
      `Tactical switch — ${tm(t)} turn their guns on ${tm(targets[t])}!`,
      `The alliance shifts: ${tm(t)} now hunting ${tm(targets[t])}.`,
      `${tm(t)} smell blood — they're going after ${tm(targets[t])} now.`]),true);
  }
  renderScore();
}
let retargetTimer=0;

// ---------- Mechanics ----------
function speedMult(p){
  let m=0.55+0.45*p.stamina;                       // fatigue (always on)
  if(momentumOn && clockSec<boostUntil[p.team]) m*=1.15;  // underdog fire
  return m;
}
function leaderIdx(){
  const alive=aliveTeams();
  let best=alive[0]??0;
  for(const t of alive) if(rankCmp(t,best)<0) best=t;
  return best;
}

function stam(p,d){ p.stamina=Math.max(0,Math.min(1,p.stamina+d)); }

// ---------- Helpers ----------
function clampInside(p,margin){
  for(const e of EDGES){
    const d=(p.x-e.p1.x)*e.nx+(p.y-e.p1.y)*e.ny;
    if(d<margin){ p.x+=e.nx*(margin-d); p.y+=e.ny*(margin-d); }
  }
}
function steer(p,tx,ty,maxV){
  maxV*=speedMult(p);
  let dx=tx-p.x, dy=ty-p.y; const d=Math.hypot(dx,dy)||1;
  if(d<8){ p.vx*=0.78; p.vy*=0.78; return; }   // arrival deadband: settle, don't orbit
  const sp=Math.min(maxV, d*0.15);
  p.vx=p.vx*p.k1+(dx/d)*sp*p.k2;               // per-player constants — no two spring alike
  p.vy=p.vy*p.k1+(dy/d)*sp*p.k2;
  const v=Math.hypot(p.vx,p.vy); if(v>maxV){p.vx*=maxV/v;p.vy*=maxV/v;}
}
function kick(tx,ty,power,isShot){
  const o=ball.owner;
  const dx=tx-ball.x, dy=ty-ball.y, d=Math.hypot(dx,dy)||1;
  ball.vx=dx/d*power; ball.vy=dy/d*power;
  ball.lastTouch=o.team; ball.lastKicker=o; ball.isShot=!!isShot;
  ball.noClaim=o; ball.noClaimF=14; ball.owner=null;
  ball.z=0; ball.zv=0;
  if(!isShot && d>235){ ball.zv=3.0; }   // long balls travel through the air
  if(isShot){ stats.shots[o.team]++; spawnNote(ball.x,ball.y-18,"shot!","#ffd166");
    if(typeof spawnPing==="function"&&ballHalo) spawnPing(ball.x,ball.y,TEAMS[o.team].color); }
}

// ---------- AI ----------
function think(dt){
  const owner=ball.owner;
  const oppOf=t=>players.filter(p=>p.team!==t&&!p.out);
  const chaser=[];
  for(let t=0;t<3;t++){
    let best=null,bd=1e9;
    players.forEach(p=>{ if(p.team===t&&p.role!=="K"&&!p.out){const d=dist(p,ball); if(d<bd){bd=d;best=p;}}});
    chaser[t]=best;
  }
  players.forEach(p=>{
    if(p.out||targets[p.team]===null)return;
    const own=goalCenter(p.team), tgt=goalCenter(targets[p.team]);
    if(p===owner){
      let near=null,nd=1e9;
      oppOf(p.team).forEach(o=>{const d=dist(o,p); if(d<nd){nd=d;near=o;}});
      let dx=tgt.x-p.x, dy=tgt.y-p.y; let dl=Math.hypot(dx,dy)||1; dx/=dl;dy/=dl;
      if(near&&nd<60){ dx+=(p.x-near.x)/nd*0.9; dy+=(p.y-near.y)/nd*0.9; }
      // wall awareness: cut infield instead of grinding the touchline
      let wd=1e9,we=null;
      for(const e2 of EDGES){const d2=(p.x-e2.p1.x)*e2.nx+(p.y-e2.p1.y)*e2.ny; if(d2<wd){wd=d2;we=e2;}}
      const inMouth=we&&we.goal&&we===EDGES[GOAL_EDGE[targets[p.team]]]&&
        Math.abs((p.x-we.mx)*we.ux+(p.y-we.my)*we.uy)<we.len*GOAL_HALF*1.3;
      if(wd<70&&!inMouth){ const w=(70-wd)/70*1.1; dx+=we.nx*w; dy+=we.ny*w; }
      steer(p,p.x+dx*80,p.y+dy*80,2.05);
    } else if(p.role==="K"){
      const e=EDGES[GOAL_EDGE[p.team]];
      let along=(ball.x-e.mx)*e.ux+(ball.y-e.my)*e.uy;
      const lim=e.len*GOAL_HALF*0.9; along=Math.max(-lim,Math.min(lim,along));
      steer(p, e.mx+e.ux*along+e.nx*20, e.my+e.uy*along+e.ny*20, 1.9);
      if(dist(p,ball)<55 && (!owner||owner.team!==p.team)) steer(p,ball.x,ball.y,2.3);
    } else if(p===chaser[p.team] && (!owner || owner.team!==p.team)){
      steer(p, ball.x+ball.vx*6, ball.y+ball.vy*6, 2.35);
    } else if(p.role==="D"){
      const ds=players.filter(q=>q.team===p.team&&q.role==="D");
      const idx=ds.indexOf(p), f=idx===0?0.38:0.62;
      const bx=own.x+(ball.x-own.x)*f, by=own.y+(ball.y-own.y)*f;
      const e=EDGES[GOAL_EDGE[p.team]];
      steer(p, bx+e.ux*(idx===0?34:-34), by+e.uy*(idx===0?34:-34), 2.0);
    } else {
      const f=p.role==="M"?0.45:0.72;
      let sx=ball.x+(tgt.x-ball.x)*f, sy=ball.y+(tgt.y-ball.y)*f;
      const side=(p.role==="M"?1:-1);
      // fan out as play compresses near the target goal — width instead of pile-in
      const dBallGoal=dist(ball,tgt);
      const spread=55+Math.max(0,(230-dBallGoal))*0.45;
      const ang=Math.atan2(tgt.y-ball.y,tgt.x-ball.x)+Math.PI/2;
      sx+=Math.cos(ang)*spread*side; sy+=Math.sin(ang)*spread*side;
      steer(p,sx,sy,2.0);
    }
  });
  // separation (gentler, timestep-scaled)
  const sepS=Math.min(1,dt*60);
  for(let i=0;i<players.length;i++)for(let j=i+1;j<players.length;j++){
    const a=players[i],b=players[j];
    if(a.out||b.out)continue;
    const d=dist(a,b);
    if(d<26&&d>0.01){const push=(26-d)/26*0.45*sepS, dx=(a.x-b.x)/d, dy=(a.y-b.y)/d;
      a.vx+=dx*push;a.vy+=dy*push;b.vx-=dx*push;b.vy-=dy*push;}
  }
  // owner decisions
  if(owner){
    if(owner.role==="K"){
      const og=goalCenter(owner.team);
      let best=null,bd=1e9;
      players.forEach(m=>{ if(m.team===owner.team&&!m.out&&(m.role==="M"||m.role==="F")){
        const d=dist(m,owner); if(d<bd){bd=d;best=m;}}});
      if(best){
        let tx=best.x+best.vx*10, ty=best.y+best.vy*10;
        if(Math.hypot(tx-og.x,ty-og.y)<dist(owner,og)+30){ tx=CX; ty=CY; }
        kick(tx,ty,Math.min(9,bd*0.05+4));
      } else kick(CX,CY,8);
      return;
    }
    const tgt=goalCenter(targets[owner.team]);
    const e=EDGES[GOAL_EDGE[targets[owner.team]]];
    const dGoal=dist(owner,tgt);
    let pressure=1e9; oppOf(owner.team).forEach(o=>pressure=Math.min(pressure,dist(o,owner)));
    // pinned on the touchline under pressure: don't grind — play the outlet
    {
      let wd=1e9,we=null;
      for(const e2 of EDGES){const d2=(owner.x-e2.p1.x)*e2.nx+(owner.y-e2.p1.y)*e2.ny;if(d2<wd){wd=d2;we=e2;}}
      const mouth=we&&we.goal&&Math.abs((owner.x-we.mx)*we.ux+(owner.y-we.my)*we.uy)<we.len*GOAL_HALF*1.3;
      if(wd<34&&pressure<58&&!mouth&&Math.random()<0.22*dt*60){
        let best=null,bs=1e9;
        players.forEach(m=>{if(m.team===owner.team&&m!==owner&&m.role!=="K"){
          const dc=dist(m,{x:CX,y:CY}); if(dc<bs){bs=dc;best=m;}}});
        if(best) kick(best.x+best.vx*8,best.y+best.vy*8,Math.min(9,dist(best,owner)*0.045+4.5));
        else kick(CX,CY,7);
        return;
      }
    }
    if(dGoal<175 && Math.random()<0.025*dt*60){
      const off=(Math.random()*2-1)*e.len*GOAL_HALF*1.0;
      kick(tgt.x+e.ux*off, tgt.y+e.uy*off, 9.5+Math.random()*1.5, true);
      return;
    }
    if(pressure<48 && Math.random()<0.10*dt*60){
      let best=null,bs=-1e9;
      players.forEach(m=>{
        if(m.team!==owner.team||m===owner||m.role==="K"||m.out)return;
        const d=dist(m,owner); if(d<60||d>270)return;
        const gain=dist(owner,tgt)-dist(m,tgt);
        let laneOk=true;
        oppOf(owner.team).forEach(o=>{
          const t=((o.x-owner.x)*(m.x-owner.x)+(o.y-owner.y)*(m.y-owner.y))/(d*d);
          if(t>0.1&&t<0.9){const lx=owner.x+(m.x-owner.x)*t, ly=owner.y+(m.y-owner.y)*t;
            if(Math.hypot(o.x-lx,o.y-ly)<24) laneOk=false;}
        });
        const s=gain+(laneOk?0:-500)+Math.random()*30;
        if(s>bs){bs=s;best=m;}
      });
      if(best&&bs>-100){ kick(best.x+best.vx*8, best.y+best.vy*8, Math.min(9,dist(best,owner)*0.045+4)); return;}
    }
    // tackles (fatigue and momentum affect steal odds; radius sits just outside body contact)
    oppOf(owner.team).forEach(o=>{
      let tc=0.010;                          // shoulder contests; most dispossession is now positional
      tc*=(0.55+0.45*o.stamina);             // fresh tacklers bite harder
      tc*=(1.35-0.5*owner.stamina);          // gassed carriers are easier to rob
      if(momentumOn&&clockSec<boostUntil[o.team]) tc*=1.3;
      if(dist(o,owner)<26 && Math.random()<tc*dt*60){   // MUST stay > body radius 23
        const victim=owner;
        ball.owner=o; ball.lastTouch=o.team; ball.lastKicker=o; ball.isShot=false;
        if(o.role==="K"){
          // keeper smothering a dribbler is goalkeeping, not a tackle — no tackle credit
          spawnNote(o.x,o.y-20,"smothered!",TEAMS[o.team].color,TEAMS[o.team].accent);
        } else {
          stats.tackles[o.team]++; o.tackles++;
          spawnNote(o.x,o.y-20,"tackle!",TEAMS[o.team].color,TEAMS[o.team].accent);
        }
        stam(o,+0.10); stam(victim,-0.12);
        if(o.role!=="K" && Math.random()<0.28) say(pick([
          `${o.name} muscles ${victim.name} off the ball!`,
          `Crunching challenge — ${o.name} strips it from ${victim.name}.`,
          `${o.name} picks ${victim.name}'s pocket!`]));
      }
    });
  }
}

// ---------- Physics ----------
function physics(dt){
  const S=dt*60;
  players.forEach(p=>{
    if(p.out)return;
    p.x+=p.vx*S; p.y+=p.vy*S; clampInside(p, p.role==="K"?12:14);
    const v=Math.hypot(p.vx,p.vy), effort=v/2.35;
    p.stamina-=effort*effort*0.0012*S;
    p.stamina+=0.0004*S;
    p.stamina=Math.max(0,Math.min(1,p.stamina));
  });
  // hard body collision: players are solid — resolve overlaps positionally (2 passes)
  const BODY=23;
  for(let pass=0;pass<2;pass++){
    for(let i=0;i<players.length;i++)for(let j=i+1;j<players.length;j++){
      const a=players[i],b=players[j];
      if(a.out||b.out)continue;
      const dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);
      if(d<BODY&&d>0.01){
        const push=(BODY-d)/2, ux=dx/d, uy=dy/d;
        a.x+=ux*push; a.y+=uy*push; b.x-=ux*push; b.y-=uy*push;
      }
    }
    players.forEach(p=>clampInside(p, p.role==="K"?12:14));
  }
  if(ball.owner){
    const o=ball.owner, v=Math.hypot(o.vx,o.vy);
    stats.poss[o.team]+=S;
    if(v>0.1){ o.hx=o.hx*0.85+(o.vx/v)*0.15; o.hy=o.hy*0.85+(o.vy/v)*0.15; }
    const hl=Math.hypot(o.hx,o.hy)||1, hx=o.hx/hl, hy=o.hy/hl;
    // hybrid dribble: the ball is its own body, spring-following the carry point
    const cpx=o.x+hx*15, cpy=o.y+hy*15;
    ball.vx+=(cpx-ball.x)*0.08*S; ball.vy+=(cpy-ball.y)*0.08*S;
    ball.vx*=Math.pow(0.90,S); ball.vy*=Math.pow(0.90,S);
    ball.x+=ball.vx*S; ball.y+=ball.vy*S;
    ball.touchT-=dt;
    if(ball.touchT<=0 && dist(ball,o)<18){
      // take a touch — long in space, short under pressure
      let pr=1e9; players.forEach(q=>{ if(q.team!==o.team&&!q.out){const d=dist(q,o); if(d<pr)pr=d;}});
      const long=pr>70;
      ball.vx+=hx*(long?3.6:2.2); ball.vy+=hy*(long?3.6:2.2);
      ball.touchT=long?0.75:0.45;
    }
    // heavy touch: the ball got away — it's anyone's now
    if(dist(ball,o)>30){
      ball.strayer=o; ball.strayF=54;
      ball.owner=null; ball.noClaim=o; ball.noClaimF=8;
    }
    if(o.team!==lastPossessTeam){
      if(clockSec-lastPossessComment>6 && lastPossessTeam!==null){
        lastPossessComment=clockSec;
        say(pick([
          `${o.name} wins it for ${tm(o.team)}.`,
          `${tm(o.team)} on the ball — ${o.name} carries.`,
          `Turnover! ${o.name} takes charge for ${tm(o.team)}.`]));
      }
      lastPossessTeam=o.team;
    }
  } else {
    const px0=ball.x, py0=ball.y;
    ball.x+=ball.vx*S; ball.y+=ball.vy*S;
    ball.vx*=Math.pow(0.985,S); ball.vy*=Math.pow(0.985,S);
    // flight and landing
    if(ball.z>0||ball.zv>0){
      ball.z+=ball.zv*S; ball.zv-=0.14*S;
      if(ball.z<=0){
        ball.z=0; ball.zv=0;
        const near=players.filter(p=>!p.out&&dist(p,ball)<50);
        const teams=new Set(near.map(p=>p.team));
        if(near.length>=2&&teams.size>=2){
          // header duel — highest man wins
          let win=null,wt=0;
          near.forEach(p=>{const w=(1/(dist(p,ball)+8))*(0.6+0.8*Math.random()); if(w>wt){wt=w;win=p;}});
          const tgt2=goalCenter(targets[win.team]??win.team);
          ball.lastTouch=win.team; ball.lastKicker=win;
          spawnNote(ball.x,ball.y-24,"header!",TEAMS[win.team].color,TEAMS[win.team].accent);
          if(Math.random()<0.4) say(pick([
            `${win.name} rises highest!`,
            `Up goes ${win.name} — wins it in the air!`,
            `${win.name} climbs above the crowd!`]));
          if(targets[win.team]!==null&&dist(ball,tgt2)<160&&win.role!=="K"){
            const e2=EDGES[GOAL_EDGE[targets[win.team]]];
            const off2=(Math.random()*2-1)*e2.len*GOAL_HALF*1.35;
            const ddx=tgt2.x+e2.ux*off2-ball.x, ddy=tgt2.y+e2.uy*off2-ball.y, dl2=Math.hypot(ddx,ddy)||1;
            ball.vx=ddx/dl2*8.5; ball.vy=ddy/dl2*8.5; ball.isShot=true;
            stats.shots[win.team]++;
            spawnPing(ball.x,ball.y,TEAMS[win.team].color);
          } else {
            const ddx=tgt2.x-ball.x, ddy=tgt2.y-ball.y, dl2=Math.hypot(ddx,ddy)||1;
            ball.vx=ddx/dl2*5; ball.vy=ddy/dl2*5;
          }
          ball.noClaim=win; ball.noClaimF=10;
        }
      }
    }
    if(ball.noClaimF>0) ball.noClaimF-=S; else ball.noClaim=null;
    if(ball.strayF>0) ball.strayF-=S; else ball.strayer=null;
    let best=null,bd=1e9;
    players.forEach(p=>{ if(p.out)return; if(p===ball.noClaim&&ball.noClaimF>0)return;
      if(ball.z>(p.role==="K"?28:12))return;   // sailing over their heads
      const sx=ball.x-px0, sy=ball.y-py0, sl=sx*sx+sy*sy;
      let t=sl>0?((p.x-px0)*sx+(p.y-py0)*sy)/sl:0;
      t=Math.max(0,Math.min(1,t));
      const d=Math.hypot(p.x-(px0+sx*t), p.y-(py0+sy*t));
      const reach=p.role==="K"?17:13;
      if(d<reach&&d<bd){bd=d;best=p;}});
    if(best){
      const wasShot=ball.isShot, spd=Math.hypot(ball.vx,ball.vy), kicker=ball.lastKicker;
      const strayer=(ball.strayF>0)?ball.strayer:null;
      ball.owner=best; ball.lastTouch=best.team; ball.x=best.x; ball.y=best.y; ball.isShot=false;
      ball.touchT=0.3; ball.strayer=null; ball.strayF=0;
      ball.lastKicker=best;   // person-level attribution follows possession
      if(strayer && best.team!==strayer.team){
        // won it off the dribbler's touch — positional dispossession
        stam(best,+0.08); stam(strayer,-0.08);
        if(best.role==="K"){
          spawnNote(best.x,best.y-20,"smothered!",TEAMS[best.team].color,TEAMS[best.team].accent);
        } else {
          stats.tackles[best.team]++; best.tackles++;
          spawnNote(best.x,best.y-20,"poked away!",TEAMS[best.team].color,TEAMS[best.team].accent);
        }
      } else
      if(wasShot && best.role==="K" && kicker && best.team!==kicker.team && spd>5){
        // a save: keeper glory, shooter deflation
        stats.saves[best.team]++; best.saves++;
        stam(best,+0.12); stam(kicker,-0.05);
        spawnNote(best.x,best.y-20,"SAVE!","#ffd166");
        if(Math.random()<0.5) say(pick([
          `<span class="goal">SAVE!</span> ${best.name} denies ${kicker.name}!`,
          `What a stop by ${best.name} — ${kicker.name} can't believe it!`,
          `${kicker.name} lets fly... ${best.name} gets a strong hand to it!`]),true);
      } else if(kicker && spd>2.2 && best!==kicker){
        if(best.team===kicker.team){
          // completed pass: small lift for both
          stam(kicker,+0.05); stam(best,+0.03);
          if(Math.random()<0.22) spawnNote(best.x,best.y-20,"pass ✓",TEAMS[best.team].color,TEAMS[best.team].accent);
        } else if(!wasShot){
          // interception: passer punished, thief energized
          stam(kicker,-0.08); stam(best,+0.06);
          spawnNote(best.x,best.y-20,"intercepted!",TEAMS[best.team].color,TEAMS[best.team].accent);
        }
      }
    }
  }
  // walls & goals
  for(let k=0;k<6;k++){
    const e=EDGES[k];
    const d=(ball.x-e.p1.x)*e.nx+(ball.y-e.p1.y)*e.ny;
    if(d<7){
      const along=(ball.x-e.mx)*e.ux+(ball.y-e.my)*e.uy;
      const gTeam=e.goal?GOAL_EDGE.indexOf(k):-1;
      const inMouth=e.goal && !out[gTeam] && Math.abs(along)<e.len*GOAL_HALF;
      if(inMouth){
        if(d<-6){
          if(ball.z<28){ goalScored(GOAL_EDGE.indexOf(k)); return; }
          else if(ball.isShot){ spawnNote(ball.x,ball.y-20,"over the bar!","#ffd166"); ball.isShot=false; }
        }
      } else {
        if(ball.isShot && ball.lastKicker){
          say(pick([
            `${ball.lastKicker.name} drags it wide!`,
            `Off target — ${ball.lastKicker.name} will want that one back.`,
            `${ball.lastKicker.name} shoots... nowhere near it.`]));
          ball.isShot=false;
        }
        ball.x+=e.nx*(7-d); ball.y+=e.ny*(7-d);
        const vn=ball.vx*e.nx+ball.vy*e.ny;
        if(vn<0){ ball.vx-=2*vn*e.nx*0.82; ball.vy-=2*vn*e.ny*0.82; }
        ball.vx+=e.nx*0.5; ball.vy+=e.ny*0.5;   // nudge infield so play comes off the wall
      }
    }
  }
}

// ---------- Goal celebration ----------
let celebrateUntil=0, pendingKickoff=null;
const celeEl=document.getElementById("celebrate"), celeCard=document.getElementById("celeCard"),
      confettiBox=document.getElementById("confettiBox");
function showCelebration(color, big, whoHTML, subHTML, fireHTML){
  celeCard.style.setProperty("--cele",color);
  celeCard.innerHTML=`<div class="big">${big}</div><div class="who">${whoHTML}</div>
    <div class="sub">${subHTML}</div><div class="fireline">${fireHTML||""}</div>`;
  confettiBox.innerHTML="";
  const palette=[color,"#ffd166","#ffffff"];
  for(let i=0;i<28;i++){
    const c=document.createElement("span");
    c.className="confetti";
    c.style.left=(Math.random()*100)+"%";
    c.style.background=palette[i%3];
    c.style.animationDelay=(Math.random()*0.6)+"s";
    c.style.transform=`rotate(${Math.random()*360}deg)`;
    confettiBox.appendChild(c);
  }
  celeEl.classList.add("show");
  celebrateUntil=performance.now()+4800;
}
function hideCelebration(){ celeEl.classList.remove("show"); confettiBox.innerHTML=""; celebrateUntil=0; }

function goalScored(concederTeam){
  const scorerTeam=ball.lastTouch;
  const scorer=(ball.owner&&ball.owner.team===scorerTeam)?ball.owner
    :((ball.lastKicker&&ball.lastKicker.team===scorerTeam)?ball.lastKicker:null);
  const wasLeader=leaderIdx();
  // true underdog test: someone ranked STRICTLY above the scorer before this goal
  const wasTrailing=(scorerTeam!==null)&&[0,1,2].some(o=>!out[o]&&o!==scorerTeam&&rankCmp(o,scorerTeam)<0);
  const legit=(scorerTeam!==null && scorerTeam!==concederTeam);
  conceded[concederTeam]++; score[concederTeam]--;
  if(legit){ score[scorerTeam]++; scored[scorerTeam]++; }
  const keeper=players.find(p=>p.team===concederTeam&&p.role==="K");
  const name=legit?((scorer&&scorer.team===scorerTeam)?scorer.name:TEAMS[scorerTeam].name):null;
  if(legit&&scorer&&scorer.team===scorerTeam){ scorer.goals++; stam(scorer,+0.2); }
  goalsLog.push({t:clockSec,name:name||TEAMS[concederTeam].name,scorer:legit?scorerTeam:null,conceder:concederTeam,own:!legit,ot:phase==="overtime"});

  // ---- overtime rules: concede and you're out; golden goal decides it ----
  if(phase==="overtime"){
    if(otGolden || aliveTeams().length===2){
      // two left: this goal settles it
      const champ=legit?scorerTeam:aliveTeams().find(t=>t!==concederTeam);
      if(legit&&scorer&&scorer.team===scorerTeam) goldenScorer=scorer;
      say(`<span class="goal">⚽ GOLDEN GOAL!</span> ${name??tm(champ)} settles it!`,true);
      crownChampion(champ, legit?`golden goal by ${name}`:`golden goal — own-goal heartbreak for ${TEAMS[concederTeam].name}`);
      return;
    }
    // three left: the conceder is eliminated, survivors play golden goal
    say(`<span class="goal">💀 ELIMINATED!</span> ${tm(concederTeam)} concede in overtime and they're OUT!`,true);
    eliminateTeam(concederTeam);
    otGolden=true;
    const survivors=aliveTeams();
    showCelebration(TEAMS[concederTeam].color,"💀 ELIMINATED!",
      `${tm(concederTeam)} are out`,
      `${legit?name+" delivers the killing blow":"an own goal ends it"} — ${tm(survivors[0])} v ${tm(survivors[1])}, next goal wins`,"");
    say(`Golden goal! ${tm(survivors[0])} against ${tm(survivors[1])} — next goal takes the title!`,true);
    computeTargets();
    flash(concederTeam);
    pendingKickoff=survivors[Math.floor(Math.random()*2)];
    return;
  }

  // ---- regulation ----
  let caughtFire=false;
  if(legit){
    const scoreline=scoreMode==="conceded"
      ?`${tm(concederTeam)} now ${conceded[concederTeam]} conceded`
      :`${tm(scorerTeam)} +1, ${tm(concederTeam)} −1`;
    say(`<span class="goal">⚽ GOOOAL!</span> ${name} beats ${keeper.name} — ${scoreline}!`,true);
    if(momentumOn && wasTrailing){
      boostUntil[scorerTeam]=clockSec+20;
      caughtFire=true;
      say(`${tm(scorerTeam)} catch fire! 🔥 The underdogs are flying for the next 20 seconds.`,true);
    }
    showCelebration(TEAMS[scorerTeam].color, "⚽ GOOOAL!",
      `<b>${name}</b> — ${tm(scorerTeam)}`,
      `beats ${keeper.name} · ${tm(concederTeam)} concede (${conceded[concederTeam]})`,
      caughtFire?`🔥 ${TEAMS[scorerTeam].name} catch fire — 20s boost!`:"");
  } else {
    say(`<span class="goal">⚽ Own goal!</span> Chaos in the box and ${tm(concederTeam)} put it in their own net.`,true);
    showCelebration(TEAMS[concederTeam].color, "😱 OWN GOAL!",
      `${tm(concederTeam)} concede`,
      `chaos in the box — it's in their own net (${conceded[concederTeam]} conceded)`, "");
  }
  computeTargets();
  flash(concederTeam); if(legit) flash(scorerTeam);
  pendingKickoff=concederTeam;   // kickoff happens after the celebration clears
}

// ---------- Full time, elimination, and the crown ----------
function eliminateTeam(t){
  out[t]=true;
  coached[t]=false; coachTarget[t]=null; if(activeCoach===t)activeCoach=null;
  players.forEach(p=>{ if(p.team===t){ p.out=true; if(ball.owner===p) ball.owner=null; }});
  if(ball.lastKicker&&ball.lastKicker.out) ball.isShot=false;
}
function crownChampion(t,how){
  phase="over";
  const order=[0,1,2].sort(rankCmp);
  const line=m=>scoreMode==="conceded"
    ?`${TEAMS[m].short} ${conceded[m]}`
    :`${TEAMS[m].short} ${score[m]>0?"+":""}${score[m]}`;
  say(`<span class="goal">🏆 ${tm(t)} ARE CHAMPIONS OF THE HEX!</span>`,true);
  // stats table
  const totPoss=stats.poss.reduce((a,b)=>a+b,0)||1;
  let grid=`<div class="statsgrid"><span class="tn hd"></span><span class="hd">G</span><span class="hd">Sv</span><span class="hd">Tk</span><span class="hd">Poss</span>`;
  for(const m of order){
    grid+=`<span class="tn" style="color:${TEAMS[m].color}">${TEAMS[m].short}</span>`+
      `<span>${scored[m]}</span><span>${stats.saves[m]}</span><span>${stats.tackles[m]}</span>`+
      `<span>${Math.round(100*stats.poss[m]/totPoss)}%</span>`;
  }
  grid+=`</div>`;
  // highlights: every goal, in order
  const mmss=x=>`${String(Math.floor(x/60)).padStart(2,"0")}:${String(Math.floor(x%60)).padStart(2,"0")}`;
  const hl=goalsLog.length?`<div class="hl">`+goalsLog.map(g=>
    g.own?`😱 ${mmss(g.t)} own goal — ${TEAMS[g.conceder].short}${g.ot?" (OT)":""}`
         :`⚽ ${mmss(g.t)} ${g.name} (${TEAMS[g.scorer].short}) v ${TEAMS[g.conceder].short}${g.ot?" (OT)":""}`
  ).join("<br>")+`</div>`:"";
  // player of the match: goals x6 (golden goal +4), saves x2, tackles x1.5; champions get x1.4
  let potm=null,pv=-1;
  players.forEach(pl=>{
    let v=pl.goals*6+pl.saves*2+pl.tackles*1.5;
    if(pl===goldenScorer)v+=4;
    if(pl.team===t)v*=1.4;
    if(v>pv){pv=v;potm=pl;}});
  const bits=[]; if(potm.goals)bits.push(`${potm.goals} goal${potm.goals>1?"s":""}`);
  if(potm.saves)bits.push(`${potm.saves} save${potm.saves>1?"s":""}`);
  if(potm.tackles)bits.push(`${potm.tackles} tackle${potm.tackles>1?"s":""}`);
  const potmLine=pv>0?`<div class="potm">⭐ Player of the Match: ${potm.name} (${TEAMS[potm.team].short}) — ${bits.join(", ")}</div>`:"";
  celeCard.style.setProperty("--cele",TEAMS[t].color);
  celeCard.innerHTML=`<div class="big">🏆 CHAMPIONS!</div>
    <div class="who">${tm(t)} take the title</div>
    <div class="sub">${order.map(line).join(" · ")}${how?" — "+how:""}</div>
    ${grid}${hl}${potmLine}
    <button id="btnRematch">Rematch</button>`;
  confettiBox.innerHTML="";
  const palette=[TEAMS[t].color,"#ffd166","#ffffff"];
  for(let i=0;i<28;i++){
    const c=document.createElement("span"); c.className="confetti";
    c.style.left=(Math.random()*100)+"%"; c.style.background=palette[i%3];
    c.style.animationDelay=(Math.random()*0.6)+"s";
    confettiBox.appendChild(c);
  }
  celeEl.classList.add("show");
  celebrateUntil=Infinity; pendingKickoff=null;
  document.getElementById("btnRematch").onclick=()=>{ hideCelebration(); showSetup(); };
}
function resolveFullTime(){
  // rank by mode metric, tiebreak on goals scored (FIFA-style)
  const order=[0,1,2].sort(rankCmp);
  const leaders=[0,1,2].filter(t=>rankCmp(t,order[0])===0);
  if(leaders.length===1){ crownChampion(order[0],"at full time"); return; }
  // dead level at the top: golden-concession overtime
  phase="overtime";
  [0,1,2].filter(t=>!leaders.includes(t)).forEach(t=>{
    say(`Full time — ${tm(t)} are eliminated on the tiebreak.`,true);
    eliminateTeam(t);
  });
  otGolden=(aliveTeams().length===2);
  if(otGolden)
    say(`<span class="goal">FULL TIME — dead level!</span> ${tm(leaders[0])} v ${tm(leaders[1])}: golden goal, next score wins the title!`,true);
  else
    say(`<span class="goal">FULL TIME — all three level!</span> Golden-concession overtime: concede and you're OUT.`,true);
  computeTargets();
  kickoff(leaders[Math.floor(Math.random()*leaders.length)]);
}

// ---------- Color commentary ----------
function colorCommentary(){
  // fatigue watch (~every 40s)
  if(clockSec-lastFatigueComment>40){
    let worst=0, wv=1;
    for(const t of aliveTeams()){
      const avg=players.filter(p=>p.team===t).reduce((s,p)=>s+p.stamina,0)/5;
      if(avg<wv){wv=avg;worst=t;}
    }
    if(wv<0.55){
      lastFatigueComment=clockSec;
      say(pick([
        `Legs are getting heavy for ${tm(worst)} — they're running on fumes.`,
        `${tm(worst)} look gassed out there. The pressing has taken its toll.`,
        `You can see ${tm(worst)} slowing down. Fatigue is real on the hex.`]));
      return;
    }
  }
  // tactical picture (~every 30s)
  if(clockSec-lastColorComment>30){
    lastColorComment=clockSec;
    const L=leaderIdx();
    const others=[0,1,2].filter(t=>t!==L);
    if(targets[others[0]]===L && targets[others[1]]===L){
      say(pick([
        `The pincer is on — ${tm(others[0])} and ${tm(others[1])} are both hunting ${tm(L)}!`,
        `Nobody stays on top for long here: ${tm(L)} lead, so ${tm(others[0])} and ${tm(others[1])} have formed an alliance of convenience.`,
        `Two thieves who agree on the target: everyone wants a piece of ${tm(L)}.`]),false,true);
    }
  }
}

function flash(t){ const c=document.getElementById("card"+t); if(!c)return;

// ---------- Narrator (Web Speech API — built into the phone, works offline) ----------
let voiceOn=false, narrator=null, queuedUtter=0;
const speechOK=("speechSynthesis" in window);
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  narrator=vs.find(v=>v.lang==="en-GB")||vs.find(v=>v.lang&&v.lang.startsWith("en"))||vs[0]||null;
}
if(speechOK){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(html){
  if(!voiceOn||!speechOK)return;
  const text=html
    .replace(/<[^>]*>/g,"")
    .replace(/[⚽🔥]/g,"")
    .replace(/GOOOAL!/g,"Goal!")
    .replace(/\+1/g,"plus one").replace(/−1/g,"minus one")
    .replace(/—/g,", ").trim();
  if(!text)return;
  if(queuedUtter>2){ speechSynthesis.cancel(); queuedUtter=0; }  // never fall behind the play
  const u=new SpeechSynthesisUtterance(text);
  if(narrator)u.voice=narrator;
  u.rate=1.12; u.pitch=1;
  queuedUtter++;
  u.onend=u.onerror=()=>{ queuedUtter=Math.max(0,queuedUtter-1); };
  speechSynthesis.speak(u);
}

let lastSayAt=-99;
function say(html,force,voice){
  // Low-priority chatter is dropped if the booth spoke in the last 3 seconds.
  if(!force && clockSec-lastSayAt<3) return;
  lastSayAt=clockSec;
  const mm=String(Math.floor(clockSec/60)).padStart(2,"0"), ss=String(Math.floor(clockSec%60)).padStart(2,"0");
  feed.unshift(`<div><span class="t">${mm}:${ss}</span>${html}</div>`);
  if(feed.length>40)feed.pop();
  feedEl.innerHTML=feed.join("");
  if(voice===undefined?force:voice) speak(html);
}

// ---------- SVG ----------
const svg=document.getElementById("pitch");
const NS="http://www.w3.org/2000/svg";
function el(tag,attrs,parent){const n=document.createElementNS(NS,tag);
  for(const k in attrs)n.setAttribute(k,attrs[k]); (parent||svg).appendChild(n); return n;}

function buildPitch(){
  const defs=el("defs",{});
  const grad=el("radialGradient",{id:"turf",cx:"50%",cy:"46%",r:"75%"},defs);
  el("stop",{offset:"0%","stop-color":"#236b41"},grad);
  el("stop",{offset:"100%","stop-color":"#174b2d"},grad);
  const hexPts=V.map(v=>`${v.x},${v.y}`).join(" ");
  el("polygon",{points:hexPts,fill:"url(#turf)",stroke:"var(--chalk)","stroke-width":3});
  // "mowing" bands: nested hexes with alternating tint
  for(let s=0.9;s>0.1;s-=0.2){
    const pts=V.map(v=>`${CX+(v.x-CX)*s},${CY+(v.y-CY)*s}`).join(" ");
    el("polygon",{points:pts,fill:"rgba(255,255,255,.028)",stroke:"none"});
  }
  [1,3,5].forEach(k=>el("line",{x1:CX,y1:CY,x2:V[k].x,y2:V[k].y,
    stroke:"rgba(255,255,255,.28)","stroke-width":2,"stroke-dasharray":"10 8"}));
  el("circle",{cx:CX,cy:CY,r:70,fill:"none",stroke:"var(--chalk)","stroke-width":2.5});
  el("circle",{cx:CX,cy:CY,r:4,fill:"var(--chalk)"});
  for(let t=0;t<3;t++){
    const e=EDGES[GOAL_EDGE[t]], hw=e.len*GOAL_HALF;
    const x1=e.mx-e.ux*hw, y1=e.my-e.uy*hw, x2=e.mx+e.ux*hw, y2=e.my+e.uy*hw;
    el("line",{x1,y1,x2,y2,stroke:TEAMS[t].color,"stroke-width":9,"stroke-linecap":"round",opacity:.95});
    el("line",{x1,y1,x2,y2,stroke:TEAMS[t].color,"stroke-width":22,"stroke-linecap":"round",opacity:.18});
    el("path",{d:`M ${x1+e.nx*4} ${y1+e.ny*4} A ${hw*1.25} ${hw*1.25} 0 0 1 ${x2+e.nx*4} ${y2+e.ny*4}`,
      fill:"none",stroke:"rgba(255,255,255,.5)","stroke-width":2});
    // team label near goal
    el("text",{x:e.mx+e.nx*48,y:e.my+e.ny*48,fill:"rgba(255,255,255,.55)",
      "font-size":"30","text-anchor":"middle","letter-spacing":"3",
      "font-family":"inherit"}).textContent=TEAMS[t].short;
  }
}

let actorEls=[], ballEl, ballHalo, ballShadow, ownerLabel, trailEls=[], trailPts=[], pings=[];
function buildActors(){
  players.forEach(p=>{
    const g=el("g",{});
    el("circle",{r:20,fill:"none",stroke:TEAMS[p.team].color,"stroke-width":3.5,opacity:0,class:"boostring"},g);
    const ring=el("circle",{r:16,fill:"none","stroke-width":3.5,
      stroke:"#7ec97e","stroke-linecap":"round",transform:"rotate(-90)"},g);
    el("circle",{r:p.role==="K"?13:12,fill:TEAMS[p.team].color,
      stroke:p.role==="K"?(p.team===2?"#222":"#fff"):"rgba(0,0,0,.35)",
      "stroke-width":p.role==="K"?3:2},g);
    if(p.team===2){ // England: St George's cross so white shirts never read as the ball
      el("line",{x1:-8,y1:0,x2:8,y2:0,stroke:"#cf1020","stroke-width":3.4},g);
      el("line",{x1:0,y1:-8,x2:0,y2:8,stroke:"#cf1020","stroke-width":3.4},g);
    }
    actorEls.push({g,ring,boost:g.querySelector(".boostring")});
  });
  // fading trail (under the ball)
  for(let i=0;i<7;i++) trailEls.push(el("circle",{r:7-i*0.7,fill:"#fff",opacity:0}));
  // ground shadow rendered separately so the ball can leave the floor
  ballShadow=el("circle",{r:10,fill:"rgba(0,0,0,.3)"});
  // the ball: classic black-pattern panels + a possession halo in the owner's color
  const bg=el("g",{});
  ballHalo=el("circle",{r:14,fill:"none","stroke-width":3.2,opacity:0},bg);
  el("circle",{r:9,fill:"#fff",stroke:"#222","stroke-width":2},bg);
  el("circle",{r:3.2,fill:"#111"},bg);
  for(let k=0;k<5;k++){const a=k*2*Math.PI/5-Math.PI/2;
    el("circle",{r:1.8,cx:6.2*Math.cos(a),cy:6.2*Math.sin(a),fill:"#111"},bg);}
  ballEl=bg;
  ownerLabel=el("text",{fill:"#fff","font-size":"28","text-anchor":"middle",
    "font-family":"inherit","paint-order":"stroke",stroke:"rgba(0,0,0,.65)","stroke-width":"4.5"});
}
let lastNoteAt={};
function spawnNote(x,y,text,color,stroke){
  const now=performance.now();
  if(lastNoteAt[text]&&now-lastNoteAt[text]<700)return;   // per-label throttle
  lastNoteAt[text]=now;
  const e=el("text",{x,y,fill:color||"#fff","font-size":"23","text-anchor":"middle",
    "font-family":"inherit","font-weight":"600","paint-order":"stroke",stroke:stroke||"rgba(0,0,0,.65)","stroke-width":"4.5"});
  e.textContent=text;
  notes.push({e,t0:now,x,y});
}
function spawnPing(x,y,color){
  pings.push({e:el("circle",{cx:x,cy:y,r:10,fill:"none",stroke:color||"#fff","stroke-width":3}),t0:performance.now()});
}
const RING_C=2*Math.PI*16;
function draw(){
  const nowMs=performance.now();
  players.forEach((p,i)=>{
    const a=actorEls[i];
    if(p.out){ a.g.setAttribute("opacity",0); return; }
    a.g.setAttribute("opacity",1);
    a.g.setAttribute("transform",`translate(${p.x},${p.y})`);
    const frac=p.stamina;
    a.ring.setAttribute("stroke-dasharray",`${(frac*RING_C).toFixed(1)} ${RING_C.toFixed(1)}`);
    a.ring.setAttribute("stroke",frac>0.6?"#7ec97e":frac>0.35?"#ffb547":"#ff6b6b");
    const boosted=momentumOn&&clockSec<boostUntil[p.team];
    a.boost.setAttribute("opacity",boosted?0.7:0);
    if(boosted)a.boost.setAttribute("r",(20+2.2*Math.sin(clockSec*9+i)).toFixed(1));
  });
  // trail: only visible when the ball is moving fast (shots and long passes)
  trailPts.unshift({x:ball.x,y:ball.y});
  if(trailPts.length>14)trailPts.pop();
  const bspd=Math.hypot(ball.vx,ball.vy);
  trailEls.forEach((c,i)=>{
    const pt=trailPts[Math.min((i+1)*2,trailPts.length-1)];
    c.setAttribute("cx",pt.x);c.setAttribute("cy",pt.y);
    c.setAttribute("opacity",bspd>4.5?(0.4*(1-i/7)).toFixed(2):0);
  });
  const lift=ball.z*0.55;
  ballEl.setAttribute("transform",`translate(${ball.x},${ball.y-lift})${ball.z>2?` scale(${(1+ball.z*0.012).toFixed(3)})`:""}`);
  ballShadow.setAttribute("cx",ball.x); ballShadow.setAttribute("cy",ball.y+3);
  ballShadow.setAttribute("r",(10-Math.min(5,ball.z*0.12)).toFixed(1));
  ballShadow.setAttribute("opacity",(0.3-Math.min(0.2,ball.z*0.005)).toFixed(2));
  // possession halo in the owner's color
  if(ball.owner){
    ballHalo.setAttribute("stroke",TEAMS[ball.owner.team].color);
    ballHalo.setAttribute("opacity",0.9);
  } else ballHalo.setAttribute("opacity",0);
  // floating event annotations
  for(let i=notes.length-1;i>=0;i--){
    const n=notes[i], age=(nowMs-n.t0)/2100;
    if(age>=1){ n.e.remove(); notes.splice(i,1); continue; }
    n.e.setAttribute("y",(n.y-30*age).toFixed(1));
    // hold at full strength for the first 45%, then fade out
    const op=age<0.45?0.95:0.95*(1-(age-0.45)/0.55);
    n.e.setAttribute("opacity",op.toFixed(2));
  }
  // expanding kick pings
  for(let i=pings.length-1;i>=0;i--){
    const pg=pings[i], age=(nowMs-pg.t0)/450;
    if(age>=1){ pg.e.remove(); pings.splice(i,1); continue; }
    pg.e.setAttribute("r",(10+age*70).toFixed(1));
    pg.e.setAttribute("opacity",(0.6*(1-age)).toFixed(2));
  }
  if(ball.owner){
    ownerLabel.setAttribute("x",ball.owner.x);
    ownerLabel.setAttribute("y",ball.owner.y-26);
    ownerLabel.textContent=ball.owner.name;
    ownerLabel.setAttribute("opacity",1);
  } else ownerLabel.setAttribute("opacity",0);
  // broadcast camera: pin to the carrier (their motion is smooth), only chase the raw
  // ball when it's genuinely loose; low-pass the target and ignore sub-10px jitter
  if(zoom>1){
    const f=ball.owner
      ? {x:ball.owner.x+ball.owner.vx*10, y:ball.owner.y+ball.owner.vy*10}
      : {x:ball.x+ball.vx*8, y:ball.y+ball.vy*8};
    camTX+=(f.x-camTX)*0.10; camTY+=(f.y-camTY)*0.10;
    const ddx=camTX-camX, ddy=camTY-camY, dd=Math.hypot(ddx,ddy);
    if(dd>0.1){
      const move=Math.max(0,dd-10)*(zoom>=3?0.12:0.07);   // soft deadband: micro-motion never pans
      camX+=ddx/dd*move; camY+=ddy/dd*move;
    }
    const vw=900/zoom, vh=810/zoom;
    const cx=Math.max(vw/2,Math.min(900-vw/2,camX));
    const cy=Math.max(vh/2,Math.min(810-vh/2,camY));
    svg.setAttribute("viewBox",`${(cx-vw/2).toFixed(1)} ${(cy-vh/2).toFixed(1)} ${vw.toFixed(1)} ${vh.toFixed(1)}`);
  }
}

// ---------- Loop ----------
let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  if(running){
    if(now<celebrateUntil){
      updateBars();               // frozen frame while we celebrate
    } else {
      if(pendingKickoff!==null){ hideCelebration(); kickoff(pendingKickoff); pendingKickoff=null;
        resumeAt=performance.now()+1200; }   // beat of stillness before play resumes
      if(phase==="regulation" && clockSec>=matchLen) resolveFullTime();
      if(phase!=="over" && now>=resumeAt){
        const step=dt*speed;
        clockSec+=step;
        retargetTimer+=step;
        if(retargetTimer>6){retargetTimer=0;computeTargets();}
        think(step); physics(step); colorCommentary();
      }
      const m=Math.floor(clockSec/60), ss=String(Math.floor(clockSec%60)).padStart(2,"0");
      document.getElementById("clock").textContent=
        phase==="overtime"?`OT ${m}:${ss}`:phase==="over"?"FT":`${m}:${ss}/${Math.floor(matchLen/60)}:00`;
      updateBars(); draw();
    }
  }
  requestAnimationFrame(loop);
}

// ---------- Camera ----------
let zoom=2.3, camX=CX, camY=CY, camTX=CX, camTY=CY;
const ZOOMS=[1,1.6,2.3,3.5];
document.getElementById("btnZoom").onclick=e=>{
  const i=(ZOOMS.indexOf(zoom)+1)%ZOOMS.length;
  zoom=ZOOMS[i];
  document.getElementById("zoomVal").textContent=zoom+"×";
  if(zoom===1) svg.setAttribute("viewBox","0 0 900 810");
  else { camX=camTX=ball.x; camY=camTY=ball.y; }   // start on the action
  draw();                              // apply immediately, even while paused
};

// ---------- Tap-to-coach ----------
function toggleCoach(t){
  if(out[t])return;
  coached[t]=!coached[t];
  if(coached[t]){
    activeCoach=t;
    say(`🎯 A new manager takes the ${tm(t)} bench! Tap a rival's card to give the order.`,true);
  } else {
    coachTarget[t]=null;
    if(activeCoach===t){ const n=coached.findIndex(c=>c); activeCoach=n>=0?n:null; }
    say(`${tm(t)} return to AI control.`,true);
  }
  computeTargets();
}
function cardTap(t){
  if(activeCoach!==null && t!==activeCoach && !out[t] && coached[activeCoach] && !out[activeCoach]){
    coachTarget[activeCoach]=t;
    say(`📋 Orders from the bench: ${tm(activeCoach)} will hunt ${tm(t)}!`,true);
    computeTargets();
  } else if(coached[t] && activeCoach!==t){
    activeCoach=t; renderScore();
  }
}

// ---------- Match setup dialog ----------
const setupEl=document.getElementById("setup");
function showSetup(){
  running=false;
  if(speechOK){ speechSynthesis.cancel(); queuedUtter=0; }
  hideCelebration(); pendingKickoff=null;
  setPlayBtn();
  setupEl.classList.add("show");
}
document.getElementById("btnStart").onclick=()=>{
  scoreMode=document.getElementById("setRules").value;
  matchLen=parseInt(document.getElementById("setLen").value,10);
  momentumOn=document.getElementById("setMom").checked;
  setupEl.classList.remove("show");
  camX=camTX=CX; camY=camTY=CY; resumeAt=0;
  resetMatch(); updateBars(); draw();
  running=true; setPlayBtn();
  say(scoreMode==="conceded"
    ?`Classic Jorn rules today — fewest conceded after ${matchLen/60} minute${matchLen>=120?"s":""} takes it.`
    :`±1 rules — ${matchLen/60} minute${matchLen>=120?"s":""} on the clock, tiebreaks by goals scored, then golden-concession overtime.`,true);
};

// ---------- Controls ----------
document.getElementById("btnPlay").onclick=()=>{ running=!running; setPlayBtn(); };
document.getElementById("btnReset").onclick=()=>{ showSetup(); };
const SPEEDS=[0.5,1,1.5,2,3];
document.getElementById("btnSpeed").onclick=()=>{
  const i=(SPEEDS.indexOf(speed)+1)%SPEEDS.length;
  speed=SPEEDS[i===-1?1:i];
  document.getElementById("speedVal").textContent=speed+"×";
};
function setPlayBtn(){
  document.querySelector("#btnPlay .ic").textContent=running?"⏸":"▶";
  document.querySelector("#btnPlay .lbl").textContent=running?"Pause":"Play";
}
const vt=document.getElementById("voiceToggle");
if(!speechOK){ vt.disabled=true; vt.parentElement.title="Speech not supported in this browser"; }
vt.onchange=e=>{
  voiceOn=e.target.checked;
  if(voiceOn) speak("Narrator on. Welcome to the hex — three teams, one ball, no permanent friends.");
  else if(speechOK){ speechSynthesis.cancel(); queuedUtter=0; }
};

// ---------- Go ----------
buildPitch();
resetMatch();
buildActors();
draw();
showSetup();
requestAnimationFrame(loop);
</script>
</body>
</html>
