    el2.innerHTML=`<span${t2==="GO!"?' style="font-size:5.2rem;letter-spacing:.05em"':''}>${t2}</span>`;
    if(t2==="GO!"){
      spawnNote(CX,CY-46,"kick-off!","#ffd166");
      say(`The whistle goes — we're underway!`,true);
      setTimeout(()=>el2.classList.remove("show"),1000);
    }
  },2200+i*1080));   // 2.2s of clear air for the trio line, then the count
}
function showSetup(){
  matchLive=false;
  document.getElementById("countdown").classList.remove("show");
  if(speechOK){ speechSynthesis.cancel(); queuedUtter=0; highQ=[]; speakingPrio=null; }
  running=false;
  if(speechOK){ speechSynthesis.cancel(); queuedUtter=0; highQ=[]; speakingPrio=null; }
  hideCelebration(); pendingKickoff=null;
  setPlayBtn();
  setupEl.classList.add("show");
}
document.getElementById("btnStart").onclick=()=>{
  scoreMode=document.getElementById("setRules").value;
  matchLen=parseInt(document.getElementById("setLen").value,10);
  momentumOn=document.getElementById("setMom").checked;
  zoneRule=document.getElementById("setZone").checked;
  oobRule=document.getElementById("setOob").checked;
  voiceOn=speechOK&&document.getElementById("setVoice").checked;
  matchLive=true;
  setVoiceUI();
  if(voiceOn&&!welcomed){ speak("Welcome to the hex — three teams, one ball, no permanent friends."); welcomed=true; }
  foulMult=parseFloat(document.getElementById("setRef").value);
  setupEl.classList.remove("show");
  camX=camTX=CX; camY=camTY=CY; resumeAt=0; camFocusP=null; camFocusUntil=0; restartHold=0; pendingRestart=null;
  walkOff=null; walkPending=null;
  resetMatch(); updateBars(); draw();
  running=true; setPlayBtn();
  startCountdown();   // LAST: nothing downstream may touch resumeAt before the whistle
  say(scoreMode==="conceded"
    ?`Classic Jorn rules today — fewest conceded after ${matchLen/60} minute${matchLen>=120?"s":""} takes it.`
    :`±1 rules — ${matchLen/60} minute${matchLen>=120?"s":""} on the clock, tiebreaks by goals scored, then golden-concession overtime.`,true,false);
  if(zoneRule) say(`Offsides enforced: no attacker may enter the penalty area before the ball.`,false,false);
  if(oobRule) say(`Touchlines in play — throw-ins, goal kicks, and corners.`,false,false);
  {
    const buses=[0,1,2].filter(t=>teamDEF[t]==="ParkTheBus").length;
    const presses=[0,1,2].filter(t=>teamDEF[t]==="Gegenpress").length;
    const swash=[0,1,2].filter(t=>teamATK[t]==="Swashbuckle").length;
    const trioLine=buses>=2?`Two buses and a hexagon. Patience will be a weapon tonight.`
      :presses>=3?`Three pressing machines. This one's decided by whoever has legs left.`
      :swash>=2?`Shooters everywhere you look. Keepers, brace.`
      :`Three philosophies walk onto a hexagon. Only one lifts the cup.`;
    say(trioLine);
  }
  if(foulMult===0) say(`🤼 No referee today — anything goes.`);
  else if(foulMult>3) say(`🚨 <b>MAYHEM</b> rules — the referee has brought extra cards and a grudge.`);
  else if(foulMult>1) say(`🟨 The referee is in a mood tonight.`);
};

// ---------- Controls ----------
document.getElementById("btnPlay").onclick=()=>{ running=!running; setPlayBtn(); };
document.getElementById("btnReset").onclick=()=>{ showSetup(); };
const SPEEDS=[0.5,1,1.5,2,3];
document.getElementById("btnSpeed").onclick=()=>{
  const i=(SPEEDS.indexOf(speed)+1)%SPEEDS.length;
  speed=SPEEDS[i===-1?1:i];
  document.getElementById("speedVal").textContent=speed+"×";
};
const IC_PAUSE='<svg viewBox="0 0 24 24"><path d="M8 5v14M16 5v14"/></svg>';
const IC_PLAY='<svg viewBox="0 0 24 24"><path d="M7 4l13 8-13 8z"/></svg>';
function setPlayBtn(){
  document.getElementById("playIc").innerHTML=running?IC_PAUSE:IC_PLAY;
  document.querySelector("#btnPlay .lbl").textContent=running?"Pause":"Play";
}
const vt=document.getElementById("btnVoice");
if(!speechOK){ vt.disabled=true; vt.title="Speech not supported in this browser"; voiceOn=false; }
function setVoiceUI(){
  vt.setAttribute("aria-pressed",String(voiceOn));
  const sv=document.getElementById("setVoice"); if(sv) sv.checked=voiceOn;
}
setVoiceUI();
vt.onclick=()=>{
  voiceOn=!voiceOn; setVoiceUI();
  if(voiceOn){ speak("Welcome to the hex — three teams, one ball, no permanent friends."); welcomed=true; }
  else if(speechOK){ speechSynthesis.cancel(); queuedUtter=0; }
};

// ---------- Go ----------
function rebuildWorld(){
  applyTeamSelection();
  while(svg.firstChild) svg.removeChild(svg.firstChild);
  buildPitch();
  resetMatch();
  buildActors();
  renderScore();
}
function renderTeamSlots(){
  const row=document.getElementById("teamSlots");
  row.innerHTML="";
  for(let i=0;i<3;i++){
    const L=TEAM_LIBRARY[selTeams[i]];
    const b=document.createElement("button");
    b.className="slotBtn"; b.textContent=L.short;
    b.style.borderColor=L.color; b.style.color=L.color;
    b.style.boxShadow=`inset 0 -3.5px 0 ${L.accent}`;
    b.onclick=()=>openTeamPick(i);
    row.appendChild(b);
  }
  const dice=document.createElement("button");
  dice.className="diceBtn"; dice.textContent="🎲"; dice.title="Random matchup";
  dice.onclick=()=>{
    const pool=[...TEAM_LIBRARY.keys()];
    for(let i=pool.length-1;i>0;i--){ const j=Math.floor(Math.random()*(i+1)); [pool[i],pool[j]]=[pool[j],pool[i]]; }
    selTeams=pool.slice(0,3);
    rebuildWorld(); renderTeamSlots();
  };
  row.appendChild(dice);
}
function openTeamPick(slot){
  const card=document.getElementById("tpCard");
  const sbar=(lbl,n,col)=>`<div class="tpStat"><b>${lbl}</b><div class="tpBarBg">
    <div class="tpBarF" style="width:${n*20}%;background:${col}"></div></div></div>`;
  card.innerHTML=`<div class="big2">Slot ${slot+1}: choose a nation</div>`+
    TEAM_LIBRARY.map((L,idx)=>{
      const st=statBars(L), taken=selTeams.includes(idx)&&selTeams[slot]!==idx;
      const barCol=lum(L.color)>0.72?L.accent:L.color;
      return `<div class="tpTeam${taken?" taken":""}" data-idx="${idx}" style="border-color:${L.color}">
        <div class="tpDot" data-dot="${idx}"></div>
        <div class="tpBody">
          <span class="tpName" style="color:${lum(L.color)>0.72?"#fff":L.color}">${L.name}</span>
          <span class="tpId">${ATK_AB[L.id.atk]}·${DEF_AB[L.id.def]}·${L.id.agg.toUpperCase()}</span>
          <div class="tpBars">
            ${sbar("ATT",st.ATT,barCol)}${sbar("DEF",st.DEF,barCol)}
            ${sbar("PRESS",st.PRS,barCol)}${sbar("FLAIR",st.FLR,barCol)}
            ${sbar("AGGRO",st.AGG,"#e05656")}
          </div>
          <div class="tpBlurb">${L.blurb} ⭐ ${L.star}</div>
        </div>
      </div>`;
    }).join("");
  card.querySelectorAll("[data-dot]").forEach(slotEl=>{
    const L=TEAM_LIBRARY[parseInt(slotEl.dataset.dot)];
    const sv=document.createElementNS(NS,"svg");
    sv.setAttribute("viewBox","-21 -21 42 42"); sv.setAttribute("width","44"); sv.setAttribute("height","44");
    const g2=el("g",{},sv);
    el("circle",{r:14,fill:L.color,stroke:lum(L.color)>0.72?"#222":"rgba(0,0,0,.4)","stroke-width":2.2},g2);
    drawMotif(g2,L);
    el("path",{d:"M20,0 L12,-5 L12,5 Z",fill:L.accent,stroke:"rgba(0,0,0,.4)","stroke-width":1},g2);
    slotEl.appendChild(sv);
  });
  card.querySelectorAll(".tpTeam").forEach(elx=>elx.onclick=()=>{
    const idx=parseInt(elx.dataset.idx);
    const other=selTeams.indexOf(idx);
    if(other>=0&&other!==slot) selTeams[other]=selTeams[slot];   // swap to prevent duplicates
    selTeams[slot]=idx;
    document.getElementById("teamPick").classList.remove("show");
    rebuildWorld(); renderTeamSlots();
  });
  document.getElementById("teamPick").classList.add("show");
}
buildPitch();
resetMatch();
buildActors();
renderTeamSlots();
draw();
showSetup();
requestAnimationFrame(loop);
</script>
</body>
</html>
