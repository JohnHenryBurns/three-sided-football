<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Three-Sided World Cup — Spain · Argentina · England</title>
<style>
  :root{
    --bg:#0d1410; --panel:#152019; --panel-edge:#233529;
    --chalk:rgba(255,255,255,.85); --ink:#e8efe9; --ink-dim:#8fa596;
    --esp:#e63946; --arg:#6fb7e3; --eng:#f2f2f2;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  /* Everything scales from this: bigger screens (in CSS px) get bigger type automatically */
  html{font-size:clamp(14px, 2.0vh + 0.4vw, 20px)}
  html,body{height:100%}
  body{
    background:var(--bg); color:var(--ink);
    font-family:"Barlow Condensed","Arial Narrow",system-ui,sans-serif;
    display:flex; flex-direction:column; overflow:hidden;
  }
  header{
    display:flex; align-items:center; gap:.6rem; flex-wrap:wrap;
    padding:.35rem .6rem; border-bottom:1px solid var(--panel-edge);
  }
  h1{font-size:1.05rem;font-weight:600;letter-spacing:.06em;text-transform:uppercase;white-space:nowrap}
  h1 span{color:var(--ink-dim);font-weight:400}
  .clock{font-size:1.05rem;font-variant-numeric:tabular-nums;letter-spacing:.08em}
  .controls{display:flex;align-items:center;gap:.55rem;margin-left:auto;flex-wrap:wrap}
  button{
    font-family:inherit;font-size:.85rem;letter-spacing:.07em;text-transform:uppercase;
    background:var(--panel);color:var(--ink);border:1px solid var(--panel-edge);
    border-radius:8px;padding:.4rem .8rem;cursor:pointer;min-height:2.1rem;
  }
  button:hover{border-color:var(--ink-dim)}
  button:focus-visible,input:focus-visible{outline:2px solid var(--arg);outline-offset:2px}
  label{font-size:.75rem;color:var(--ink-dim);letter-spacing:.05em;text-transform:uppercase;display:flex;align-items:center;gap:.3rem;white-space:nowrap}
  button{display:inline-flex;align-items:center;justify-content:center;gap:.35rem}
  .ico{display:inline-flex;width:1.05em;height:1.05em;flex:none}
  .ico svg{width:100%;height:100%;fill:none;stroke:currentColor;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}
  button .val{font-variant-numeric:tabular-nums;white-space:nowrap}
  button.toggle[aria-pressed="true"]{border-color:var(--esp);color:#fff;background:rgba(230,57,70,.16)}
  input[type=range]{accent-color:var(--arg);width:4.5rem;height:1.4rem}
  input[type=checkbox]{accent-color:var(--esp);width:1rem;height:1rem}
  select{font-family:inherit;font-size:.78rem;background:var(--panel);color:var(--ink);
    border:1px solid var(--panel-edge);border-radius:6px;padding:.2rem .3rem}
  .card.out{opacity:.45;filter:grayscale(.6)}
  .card{cursor:pointer;-webkit-tap-highlight-color:transparent}
  .coachBtn{margin-left:.35rem;font-size:.68rem;padding:.12rem .4rem;min-height:auto;
    border-radius:5px;background:rgba(0,0,0,.3);flex:none}
  .card.coached .coachBtn{background:var(--team);color:#10150f;font-weight:700}
  .card.activeC{animation:coachPulse 1.3s ease-in-out infinite}
  @keyframes coachPulse{0%,100%{box-shadow:0 0 0 0 var(--team)}50%{box-shadow:0 0 13px 2px var(--team)}}
  .hunt .ord{color:#ffd166}
  @media (prefers-reduced-motion:reduce){ .card.activeC{animation:none;box-shadow:0 0 10px 1px var(--team)} }

  /* The pitch gets a guaranteed share of width; the SVG letterboxes itself inside it */
  .grid{
    flex:1; min-height:0;
    display:grid; grid-template-columns:minmax(0,2.2fr) minmax(0,1fr);
    gap:.5rem; padding:.5rem; width:100%; margin:0 auto;
  }
  /* broadcast HUD floats over the pitch */
  #hud{position:absolute;top:.35rem;left:.35rem;right:.35rem;z-index:5;
    display:flex;flex-direction:column;gap:.3rem;align-items:center;pointer-events:none}
  .hudclock{background:rgba(8,14,10,.78);border:1px solid var(--panel-edge);border-radius:8px;
    padding:.2rem .55rem;font-size:.82rem;font-variant-numeric:tabular-nums;letter-spacing:.04em;
    pointer-events:auto;white-space:nowrap}
  .chips{display:flex;gap:.35rem;flex-wrap:wrap;justify-content:center}
  .chips .card{pointer-events:auto;background:rgba(8,14,10,.78);margin:0;padding:.2rem .4rem;
    border-radius:8px;min-width:4.4rem}
  .chips .card .name{font-size:.72rem;gap:.25rem}
  .chips .card .pts{font-size:1.1rem}
  .chips .card .con{font-size:.56rem}
  .chips .card .hunt{font-size:.62rem;margin-top:0}
  .chips .card .stambar{margin-top:.18rem;height:.18rem}
  .chips .card .row{margin-top:0;gap:.3rem}
  .chips .coachBtn{font-size:.58rem;padding:.08rem .3rem}
  aside{
    background:var(--panel); border:1px solid var(--panel-edge); border-radius:10px;
    padding:.5rem; overflow-y:auto; min-height:0;
  }
  .stage{position:relative; min-width:0; min-height:0}
  .stage svg{position:absolute; inset:0; width:100%; height:100%; display:block}

  .card{
    border:1px solid var(--panel-edge); border-left:.28rem solid var(--team);
    border-radius:8px; padding:.4rem .55rem; margin-bottom:.5rem; background:rgba(0,0,0,.15);
    transition:box-shadow .3s;
  }
  .card.flash{box-shadow:0 0 16px var(--team)}
  .card .name{font-size:1rem;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:.35rem}
  .card .name .nm{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
  .card .dot{width:.6rem;height:.6rem;border-radius:50%;background:var(--team);flex:none}
  .card .row{display:flex;align-items:baseline;gap:.5rem;margin-top:.1rem}
  .card .pts{font-size:1.7rem;font-weight:600;font-variant-numeric:tabular-nums;line-height:1}
  .card .con{font-size:.75rem;color:var(--ink-dim);font-variant-numeric:tabular-nums}
  .card .hunt{font-size:.8rem;color:var(--ink-dim);margin-top:.1rem}
  .card .hunt b{color:var(--hunt-color)}
  .stambar{height:.3rem;border-radius:.15rem;background:rgba(255,255,255,.12);margin-top:.3rem;overflow:hidden}
  .stambar i{display:block;height:100%;background:var(--stam-color,#7ec97e);width:100%;transition:width .4s}
  .fire{font-size:.7rem;color:#ffb547;letter-spacing:.05em;margin-top:.1rem;min-height:.85rem}

  .feedTitle{font-size:.75rem;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:.3rem;position:sticky;top:-.5rem;background:var(--panel);padding:.25rem 0}
  .feed div{font-size:.95rem;line-height:1.4;padding:.28rem 0;border-bottom:1px solid rgba(255,255,255,.06)}
  .feed div:first-of-type{color:#fff}
  .feed .t{font-variant-numeric:tabular-nums;color:var(--ink-dim);margin-right:.3rem;font-size:.7rem}
  .feed .goal{color:#ffd166}
  .tm{font-weight:600}

  /* Momentum flame on the scorecard */
  .flame{display:none;margin-left:auto;font-size:1.05rem}
  .card.hot{box-shadow:0 0 14px rgba(255,181,71,.45)}
  .card.hot .flame{display:inline-block;animation:flick .6s infinite alternate}
  @keyframes flick{from{transform:scale(1) rotate(-4deg)}to{transform:scale(1.3) rotate(5deg)}}

  /* Goal celebration overlay */
  #celebrate{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(6,10,8,.6);z-index:50;pointer-events:none}
  #celebrate.show{display:flex}
  #celebrate .cele{pointer-events:auto}
  #setup{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    background:rgba(6,10,8,.75);z-index:60}
  #setup.show{display:flex}
  .setupCard{border-color:var(--arg);min-width:min(22rem,90vw)}
  .ghlink{display:block;margin-top:.8rem;font-size:.72rem;color:var(--ink-dim);
    text-decoration:none;letter-spacing:.08em;text-transform:uppercase}
  .ghlink:hover{color:var(--ink);text-decoration:underline}
  #coachMenu{position:fixed;inset:0;background:rgba(4,8,6,.62);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;z-index:70;padding:1rem}
  #coachMenu.show{display:flex}
  #cmCard{background:var(--panel);border:3px solid var(--cele,#fff);border-radius:16px;
    padding:1.1rem 1.2rem;width:min(26rem,92vw);max-height:88vh;overflow-y:auto;text-align:center;
    box-sizing:border-box}
  #cmCard .big2{font-size:1.2rem;letter-spacing:.1em;text-transform:uppercase;font-weight:600}
  .cmSec{margin-top:.75rem;font-size:.64rem;letter-spacing:.16em;color:var(--ink-dim);text-transform:uppercase}
  .cmRow{display:grid;gap:.35rem;margin-top:.32rem}
  .cmRow .cmBtn{width:100%;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
  .cmFoot{grid-template-columns:1fr 1fr;margin-top:.9rem}
  .cmDesc{font-size:.7rem;color:var(--ink-dim);margin-top:.3rem;min-height:2.6em;line-height:1.3}
  .cmBtn{font-size:.72rem;padding:.38rem .3rem}
  .cmBtn.sel{border-color:var(--cele);color:#fff;background:rgba(255,255,255,.08);box-shadow:0 0 8px var(--cele)}
  .cmBtn.go{border-color:var(--arg)}
  .slotRow{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:.35rem;flex:1}
  .diceBtn{padding:.3rem .55rem;font-size:1rem}
  .slotBtn{font-weight:700;letter-spacing:.06em}
  #teamPick{position:fixed;inset:0;background:rgba(4,8,6,.66);backdrop-filter:blur(2px);
    display:none;align-items:center;justify-content:center;z-index:80;padding:1rem}
  #teamPick.show{display:flex}
  #tpCard{background:var(--panel);border:3px solid #fff;border-radius:16px;
    padding:1rem 1.1rem;max-width:min(28rem,94vw);max-height:88vh;overflow-y:auto}
  .tpTeam{border:2px solid rgba(255,255,255,.18);border-radius:12px;padding:.55rem .7rem;
    margin-top:.5rem;cursor:pointer;background:rgba(255,255,255,.03);
    display:flex;gap:.65rem;align-items:flex-start}
  .tpDot{flex:0 0 44px;padding-top:.15rem}
  .tpBody{flex:1;min-width:0}
  .tpTeam:active{background:rgba(255,255,255,.09)}
  .tpTeam.taken{opacity:.45}
  .tpName{font-weight:800;font-size:1.02rem;letter-spacing:.04em}
  .tpId{font-size:.72rem;color:var(--ink-dim);letter-spacing:.1em;margin-left:.4rem}
  .tpBars{display:grid;grid-template-columns:1fr 1fr;gap:.22rem .9rem;margin-top:.32rem}
  .tpStat{display:flex;align-items:center;gap:.35rem}
  .tpStat b{font-size:.6rem;color:var(--ink-dim);width:2.9rem;text-align:right;
    letter-spacing:.06em;font-weight:600}
  .tpBarBg{flex:1;height:6px;border-radius:3px;background:rgba(255,255,255,.13)}
  .tpBarF{height:100%;border-radius:3px}
  #countdown{position:fixed;inset:0;display:none;align-items:center;justify-content:center;
    z-index:70;pointer-events:none;font-weight:900;font-size:7rem;color:#fff;
    text-shadow:0 4px 22px rgba(0,0,0,.75)}
  #countdown.show{display:flex}
  #countdown span{animation:countPop .9s ease-out}
  @keyframes countPop{0%{transform:scale(1.7);opacity:0}22%{transform:scale(1);opacity:1}
    82%{opacity:1}100%{transform:scale(.92);opacity:0}}
  #countdown span{animation-duration:1.06s}
  .tpBlurb{font-size:.74rem;color:var(--ink-dim);margin-top:.22rem;line-height:1.3}
  .setupCard .big{font-size:2rem}
  .formrow{display:flex;flex-direction:column;align-items:stretch;gap:.3rem;margin-top:.9rem;font-size:.95rem;text-align:left}
  .formrow label{font-size:.78rem;color:var(--ink-dim);letter-spacing:.08em}
  .formrow select{width:100%;font-size:.95rem;padding:.45rem .5rem}
  .formrow.chk{flex-direction:row;justify-content:space-between;align-items:center}
  .cele button{margin-top:.8rem;font-size:.9rem;border-color:var(--cele,var(--arg))}
  .cele{max-height:88vh;overflow-y:auto}
  .statsgrid{display:grid;grid-template-columns:auto repeat(4,minmax(2.6rem,auto));gap:.18rem .7rem;
    font-size:.95rem;margin:.7rem auto 0;width:fit-content;text-align:right;font-variant-numeric:tabular-nums}
  .statsgrid .tn{text-align:left;font-weight:600}
  .statsgrid .hd{color:var(--ink-dim);font-size:.8rem;letter-spacing:.08em}
  .hl{font-size:.92rem;color:var(--ink-dim);margin-top:.55rem;line-height:1.6}
  .potm{font-size:1.05rem;color:#ffd166;margin-top:.55rem}
  .cele{background:var(--panel);border:3px solid var(--cele,#fff);border-radius:18px;
    padding:1.5rem 2.5rem;text-align:center;max-width:92vw;min-width:min(26rem,88vw);
    box-shadow:0 0 70px var(--cele,#fff);animation:pop .35s ease-out}
  .cele .big{font-size:clamp(1.5rem,7vw,3.1rem);font-weight:600;color:#ffd166;letter-spacing:.04em;line-height:1.1;overflow-wrap:break-word}
  .cele .who{font-size:2.1rem;margin-top:.3rem}
  .cele .who b{color:var(--cele)}
  .cele .sub{font-size:1.25rem;color:var(--ink-dim);margin-top:.45rem}
  .cele .fireline{font-size:1.2rem;color:#ffb547;margin-top:.35rem;min-height:1.35rem}
  @keyframes pop{from{transform:scale(.55);opacity:0}to{transform:scale(1);opacity:1}}
  .confetti{position:absolute;top:-8vh;width:.5rem;height:.85rem;border-radius:2px;opacity:.95;
    animation:fall 1.8s cubic-bezier(.3,.6,.6,1) forwards}
  @keyframes fall{to{transform:translateY(120vh) rotate(680deg);opacity:.65}}
  @media (prefers-reduced-motion:reduce){ .cele{animation:none} .card.hot .flame{animation:none} .confetti{display:none} }

  /* Portrait phones: stack, pitch on top with the HUD overlaid */
  @media (orientation:portrait){
    .cele{padding:1.2rem 1.1rem}
    body{overflow:auto}
    .grid{grid-template-columns:1fr; grid-auto-rows:auto}
    .stage{order:-1; height:60vh}
    #hud{gap:.22rem}
    .hudclock{font-size:.7rem;padding:.16rem .45rem}
    .chips{flex-wrap:nowrap;gap:.25rem;max-width:100%;overflow-x:auto;scrollbar-width:none}
    .chips .card{min-width:3.5rem;padding:.14rem .3rem}
    .chips .card .con{display:none}
    .chips .card .pts{font-size:.9rem}
    .chips .card .name{font-size:.64rem}
    .chips .card .hunt{font-size:.56rem}
    .chips .coachBtn{padding:.05rem .22rem;font-size:.54rem}
    aside.comm{max-height:32vh}
    /* title gets its own short row; five equal controls share the row below */
    header{padding:.3rem .5rem .35rem;gap:.3rem;flex-direction:column;align-items:stretch}
    h1{font-size:.78rem;letter-spacing:.12em;color:var(--ink-dim)}
    h1 span{display:none}
    .controls{margin-left:0;gap:.3rem;flex-wrap:nowrap;width:100%}
    .controls button{flex:1 1 0;min-width:0;padding:.32rem .2rem;min-height:2.1rem;font-size:.82rem}
    button .lbl{display:none}
  }
  @media (max-width:1100px){ h1 span{display:none} }
  @media (prefers-reduced-motion:reduce){ .card,.stambar i{transition:none} }
</style>
</head>
<body>
<header>
  <h1>Three-Sided World Cup <span>/ ESP · ARG · ENG</span></h1>
  <div class="controls">
    <button id="btnPlay" title="Pause / Play"><span class="ico" id="playIc"><svg viewBox="0 0 24 24"><path d="M8 5v14M16 5v14"/></svg></span><span class="lbl">Pause</span></button>
    <button id="btnReset" title="Reset match"><span class="ico"><svg viewBox="0 0 24 24"><path d="M4 4v6h6"/><path d="M4.6 10A8 8 0 1 0 12 4a8 8 0 0 0-6 2.7"/></svg></span><span class="lbl">Reset</span></button>
    <button id="btnZoom" title="Zoom"><span class="ico"><svg viewBox="0 0 24 24"><circle cx="10.5" cy="10.5" r="6.5"/><path d="M15.5 15.5L21 21"/></svg></span><span class="val" id="zoomVal">2.3×</span></button>
    <button id="btnSpeed" title="Speed"><span class="ico"><svg viewBox="0 0 24 24"><path d="M4 5l7 7-7 7M13 5l7 7-7 7"/></svg></span><span class="val" id="speedVal">1×</span></button>
    <button id="btnVoice" class="toggle" title="Spoken narrator" aria-pressed="false"><span class="ico"><svg viewBox="0 0 24 24"><rect x="9" y="3" width="6" height="12" rx="3"/><path d="M6 11a6 6 0 0 0 12 0M12 17v4"/></svg></span><span class="lbl">Narrator</span></button>
  </div>
</header>

<div class="grid">
  <div class="stage">
    <div id="hud">
      <div id="scoreboard" class="chips" aria-label="Scoreboard"></div>
      <div class="hudclock" id="clock">00:00</div>
    </div>
    <svg id="pitch" viewBox="-110 -110 1120 1030" role="img" aria-label="Hexagonal pitch, three teams"></svg>
  </div>
  <aside class="comm" aria-label="Commentary">
    <div class="feedTitle">Play-by-play</div>
    <div class="feed" id="feed"></div>
  </aside>
</div>

<div id="celebrate"><div id="confettiBox"></div><div class="cele" id="celeCard"></div></div>

<div id="setup"><div class="cele setupCard">
  <div class="big">⚽ MATCH SETUP</div>
  <div class="formrow"><label for="setRules">Scoring</label><select id="setRules">
    <option value="points">±1 points (scorer +1, conceder −1)</option>
    <option value="conceded">Classic — fewest conceded wins</option>
  </select></div>
  <div class="formrow"><label for="setLen">Match length</label><select id="setLen">
    <option value="60" selected>1 minute — blitz</option>
    <option value="180">3 minutes</option>
    <option value="300">5 minutes</option>
    <option value="600">10 minutes</option>
  </select></div>
  <div class="formrow chk"><label for="setMom">Underdog fire</label><input id="setMom" type="checkbox" checked></div>
  <div class="formrow chk"><label for="setZone" title="Attackers can't enter the penalty area before the ball">Enforce offsides</label><input id="setZone" type="checkbox" checked></div>
  <div class="formrow chk"><label for="setOob" title="Touchlines in play: throw-ins, goal kicks, corners, keeper parries">Out of bounds</label><input id="setOob" type="checkbox" checked></div>
  <div class="formrow chk"><label for="setVoice" title="Spoken play-by-play (uses your phone's voice)">🎙️ Announcer</label><input id="setVoice" type="checkbox" checked></div>
  <div class="formrow"><label>Teams</label><div id="teamSlots" class="slotRow"></div></div>
  <div class="formrow"><label for="setRef">Referee</label><select id="setRef">
    <option value="0">Off — let them play</option>
    <option value="1" selected>Balanced</option>
    <option value="1.8">Aggressive</option>
    <option value="3.5">MAYHEM</option>
  </select></div>
  <button id="btnStart">Kick off</button>
  <a class="ghlink" href="https://github.com/JohnHenryBurns/three-sided-football" target="_blank" rel="noopener">⚙ view on GitHub</a>
</div></div>
<div id="coachMenu"><div id="cmCard"></div></div>
<div id="teamPick"><div id="tpCard"></div></div>
<div id="countdown"></div>

<script>
"use strict";
// ---------- Teams & rosters (2026 WC squads) ----------
const TEAM_LIBRARY=[
  {name:"Spain", short:"ESP", color:"#e63946", accent:"#f7c948",
   roster:["Unai Simón","Laporte","Cucurella","Rodri","Lamine Yamal"],
   third:"#8a1024", motif:{t:"hband",c:["#f7c948"]},
   id:{atk:"TikiTaka",def:"Gegenpress",agg:"Clean"}, star:"Lamine Yamal",
   blurb:"Death by a thousand touches, then a teenager ruins your night."},
  {name:"Argentina", short:"ARG", color:"#6fb7e3", accent:"#ffffff",
   roster:["Dibu Martínez","Romero","Tagliafico","Enzo Fernández","Messi"],
   third:"#f7c948", motif:{t:"sun",c:["#f7c948"]},
   id:{atk:"Probe",def:"Trap",agg:"Nasty"}, star:"Messi",
   blurb:"Patient, cynical, and utterly certain it will end their way."},
  {name:"England", short:"ENG", color:"#f2f2f2", accent:"#cf1020",
   roster:["Pickford","Stones","Guéhi","Bellingham","Kane"],
   third:"#28418f", motif:{t:"cross",c:["#cf1020"]},
   id:{atk:"RouteOne",def:"Balanced",agg:"Firm"}, star:"Bellingham",
   blurb:"Over the top, second balls, and belief that hurts to watch."},
  {name:"Brazil", short:"BRA", color:"#f7d117", accent:"#1d8a4e",
   roster:["Alisson","Marquinhos","Militão","Bruno Guimarães","Vinícius Jr"],
   third:"#2a4db8", motif:{t:"diamond",c:["#1d8a4e","#2a4db8"]},
   id:{atk:"Swashbuckle",def:"Balanced",agg:"Clean"}, star:"Vinícius Jr",
   blurb:"Jogo bonito. Goals at both ends and no apologies at either."},
  {name:"Germany", short:"GER", color:"#6a7280", accent:"#ffce00",
   roster:["ter Stegen","Rüdiger","Tah","Musiala","Havertz"],
   third:"#c8102e", motif:{t:"hbands2",c:["#c8102e","#ffce00"]},
   id:{atk:"Balanced",def:"Gegenpress",agg:"Firm"}, star:"Musiala",
   blurb:"The machine hunts in packs and never stops running."},
  {name:"Italy", short:"ITA", color:"#1268c3", accent:"#f5f5f5",
   roster:["Donnarumma","Bastoni","Di Lorenzo","Barella","Retegui"],
   third:"#1d8a4e", motif:{t:"vbands",c:["#1d8a4e","#f5f5f5","#c8102e"]},
   id:{atk:"Probe",def:"ParkTheBus",agg:"Nasty"}, star:"Donnarumma",
   blurb:"Catenaccio lives. You shall not pass, and you may get kicked."},
  {name:"France", short:"FRA", color:"#28418f", accent:"#e63946",
   roster:["Maignan","Saliba","Koundé","Tchouaméni","Mbappé"],
   third:"#f5f5f5", motif:{t:"vbands",c:["#28418f","#f5f5f5","#e63946"]},
   nudge:{line:.28}, id:{atk:"Swashbuckle",def:"Trap",agg:"Firm"}, star:"Mbappé",

// rating: higher = doing better, under either scoring mode
function rating(t){ return scoreMode==="conceded" ? -conceded[t] : score[t]; }
// full ranking: rating first, then FIFA-style tiebreak on goals scored
function rankCmp(a,b){ return (rating(b)-rating(a)) || (scored[b]-scored[a]); }
function aliveTeams(){ return [0,1,2].filter(t=>!out[t]); }

function computeTargets(){
  const old=targets?targets.slice():null;

  for(let t=0;t<3;t++){
    if(out[t]){ targets[t]=null; continue; }
    if(coached[t]&&coachTarget[t]!==null&&out[coachTarget[t]]) coachTarget[t]=null; // order died with the team
    if(coached[t]&&coachTarget[t]!==null){ targets[t]=coachTarget[t]; continue; }   // orders are orders
    const others=aliveTeams().filter(o=>o!==t);
    if(!others.length){ targets[t]=null; continue; }
    others.sort((a,b)=>(rating(b)-rating(a))||(conceded[a]-conceded[b]));
  refreshNameColors();   // players now truly exist
    targets[t]=others[0];
  }
  if(old){
    const changed=t=>targets[t]!==null&&old[t]!==targets[t]&&old[t]!==undefined&&!coached[t];
    const mutualDone=[false,false,false];
    for(let a2=0;a2<3;a2++) for(let b2=a2+1;b2<3;b2++)
      if(changed(a2)&&changed(b2)&&targets[a2]===b2&&targets[b2]===a2){
        mutualDone[a2]=mutualDone[b2]=true;

          `${tm(a2)} and ${tm(b2)} turn on EACH OTHER — no more pretending!`,
          `It's personal now: ${tm(a2)} and ${tm(b2)} set their sights on each other.`,
          `The hex delivers a grudge match — ${tm(a2)} and ${tm(b2)}, eye to eye.`]),true);
      }
    for(let t=0;t<3;t++) if(changed(t)&&!mutualDone[t])
    say(pick([
      `Tactical switch — ${tm(t)} turn their guns on ${tm(targets[t])}!`,
      `The alliance shifts: ${tm(t)} now hunting ${tm(targets[t])}.`,
      `${tm(t)} smell blood — they're going after ${tm(targets[t])} now.`,

function speedMult(p){
  let m=0.55+0.45*p.stamina;                       // fatigue (always on)
  if(momentumOn && clockSec<boostUntil[p.team]) m*=1.15;  // underdog fire
  return m;
}
function leaderIdx(){
  const alive=aliveTeams();
  let best=alive[0]??0;
  for(const t of alive) if(rankCmp(t,best)<0) best=t;
  return best;
}

function stam(p,d){ p.stamina=Math.max(0,Math.min(1,p.stamina+d)); }

// ---------- Helpers ----------
function clampInside(p,margin){
  for(const e of EDGES){
    const d=(p.x-e.p1.x)*e.nx+(p.y-e.p1.y)*e.ny;
    if(d<margin){ p.x+=e.nx*(margin-d); p.y+=e.ny*(margin-d); }
  }
}
function steer(p,tx,ty,maxV){
  maxV*=speedMult(p);
  let dx=tx-p.x, dy=ty-p.y; const d=Math.hypot(dx,dy)||1;
  if(d<8){ p.vx*=0.78; p.vy*=0.78; return; }   // arrival deadband: settle, don't orbit
  const sp=Math.min(maxV, d*0.15);
  p.vx=p.vx*p.k1+(dx/d)*sp*p.k2;               // per-player constants — no two spring alike
  p.vy=p.vy*p.k1+(dy/d)*sp*p.k2;
  const v=Math.hypot(p.vx,p.vy); if(v>maxV){p.vx*=maxV/v;p.vy*=maxV/v;}
}
function kick(tx,ty,power,isShot){
  const o=ball.owner;
  ball.allyPass=false;
  if(oobRule&&!isShot){
    for(const e of EDGES){                       // aim inside the lines
      const dd=(tx-e.p1.x)*e.nx+(ty-e.p1.y)*e.ny;
      if(dd<26){tx+=e.nx*(26-dd);ty+=e.ny*(26-dd);}
    }
    let ux2=tx-ball.x, uy2=ty-ball.y; const ul=Math.hypot(ux2,uy2)||1; ux2/=ul; uy2/=ul;
    let ahead=1e9;                                // don't overhit into touch
    for(const e of EDGES){
      const den=-(ux2*e.nx+uy2*e.ny);
      if(den>0.05){const db=(ball.x-e.p1.x)*e.nx+(ball.y-e.p1.y)*e.ny;
        ahead=Math.min(ahead,(db-8)/den);}
    }
    power=Math.min(power,4+ahead*0.035);
  }
  const dx=tx-ball.x, dy=ty-ball.y, d=Math.hypot(dx,dy)||1;
  ball.vx=dx/d*power; ball.vy=dy/d*power;
  ball.lastTouch=o.team; ball.lastKicker=o; ball.isShot=!!isShot;
  ball.noClaim=o; ball.noClaimF=14; ball.owner=null;
  ball.z=0; ball.zv=0;
  if(!isShot && d>235){ ball.zv=3.0; }   // long balls travel through the air
  if(isShot){ stats.shots[o.team]++; spawnNote(ball.x,ball.y-18,"shot!","#ffd166");
    if(typeof spawnPing==="function"&&ballHalo) spawnPing(ball.x,ball.y,TEAMS[o.team].color); }
}

// ---------- AI ----------
function think(dt){
  const owner=ball.owner;
  const holdActive=performance.now()<restartHold;   // restart staging: ball dead, positioning live
  const FL=[fieldersLeft(0),fieldersLeft(1),fieldersLeft(2)];   // cached: avoids per-player array filters
  for(let a2=0;a2<3;a2++) coalAlly[a2]=allied(a2,(a2+1)%3)||allied(a2,(a2+2)%3);
  const oppOf=t=>players.filter(p=>p.team!==t&&!p.out&&!p.sentOff);
  const chaser=[];
  for(let t=0;t<3;t++){
    let best=null,bd=1e9;
    players.forEach(p=>{ if(p.team===t&&(p.role!=="K"||FL[t]===0)&&!p.out&&!p.sentOff){const d=dist(p,ball); if(d<bd){bd=d;best=p;}}});
    chaser[t]=best;
  }
  players.forEach(p=>{
    if(p.out||p.sentOff||targets[p.team]===null)return;
    if(pendingRestart){
      const R=pendingRestart;
      if(p===R.p){
        steer(p,R.x,R.y,2.6);
        if(dist(p,{x:R.x,y:R.y})<10||performance.now()>R.cap){
          p.x=R.x; p.y=R.y; p.vx=0; p.vy=0;
          ball.owner=p; ball.lastTouch=p.team; ball.lastKicker=p; ball.touchT=0.4;
          restartHold=performance.now()+(cornerTaker===p?500:260);
          if(cornerTaker!==p) throwPending=p;   // a throw must find a teammate
          pendingRestart=null;
        }
        return;
      }
    }
    if(holdActive){
      const rx=pendingRestart?pendingRestart.x:ball.x, ry=pendingRestart?pendingRestart.y:ball.y;
      const rteam=pendingRestart?pendingRestart.team:(ball.owner?ball.owner.team:-1);
      if(p.team!==rteam){
        const dd2=Math.hypot(p.x-rx,p.y-ry);
        if(dd2<46){
          let tx2=rx+(p.x-rx)/(dd2||1)*54, ty2=ry+(p.y-ry)/(dd2||1)*54;
          for(const e2 of EDGES){                       // never ask a man to stand off the pitch
            const de=(tx2-e2.p1.x)*e2.nx+(ty2-e2.p1.y)*e2.ny;
            if(de<20){ tx2+=e2.nx*(20-de); ty2+=e2.ny*(20-de); }
          }
          steer(p, tx2, ty2, 2.0); return;
        }
      }
    }
    const own=goalCenter(p.team), tgt=goalCenter(targets[p.team]);
    if(p===owner){
      let near=null,nd=1e9;
      oppOf(p.team).forEach(o=>{const d=dist(o,p); if(d<nd){nd=d;near=o;}});
      let dx=tgt.x-p.x, dy=tgt.y-p.y; let dl=Math.hypot(dx,dy)||1; dx/=dl;dy/=dl;
      if(near&&nd<60){ dx+=(p.x-near.x)/nd*0.9; dy+=(p.y-near.y)/nd*0.9; }
      // wall awareness: cut infield instead of grinding the touchline
      let wd=1e9,we=null;
      for(const e2 of EDGES){const d2=(p.x-e2.p1.x)*e2.nx+(p.y-e2.p1.y)*e2.ny; if(d2<wd){wd=d2;we=e2;}}
      const inMouth=we&&we.goal&&we===EDGES[GOAL_EDGE[targets[p.team]]]&&
        Math.abs((p.x-we.mx)*we.ux+(p.y-we.my)*we.uy)<we.len*GOAL_HALF*1.3;
      const wallR=oobRule?95:70, wallW=oobRule?1.6:1.1;
      if(wd<wallR&&!inMouth){ const w=(wallR-wd)/wallR*wallW; dx+=we.nx*w; dy+=we.ny*w; }
      steer(p,p.x+dx*80,p.y+dy*80,2.05);
    } else if(p.role==="K"&&(FL[p.team]>0||dist(ball,goalCenter(p.team))<210)){
      const e=EDGES[GOAL_EDGE[p.team]];
      let along=(ball.x-e.mx)*e.ux+(ball.y-e.my)*e.uy;
      const lim=e.len*GOAL_HALF*0.9; along=Math.max(-lim,Math.min(lim,along));
      steer(p, e.mx+e.ux*along+e.nx*20, e.my+e.uy*along+e.ny*20, 1.9);
      if(dist(p,ball)<55 && (!owner||owner.team!==p.team)) steer(p,ball.x,ball.y,2.3);
    } else if(p===chaser[p.team] && (!owner || owner.team!==p.team)){
      if(holdActive&&owner){
        const dx3=p.x-ball.x, dy3=p.y-ball.y, d3=Math.hypot(dx3,dy3)||1;
        steer(p, ball.x+dx3/d3*52, ball.y+dy3/d3*52, 1.9);   // prowl the ten yards
      } else
      steer(p, ball.x+ball.vx*6, ball.y+ball.vy*6, 2.15+0.4*T(p.team).press);
    } else if(p.role==="D"){
      const ds=players.filter(q=>q.team===p.team&&q.role==="D");
      const idx=ds.indexOf(p), TT=T(p.team), lineShift=(TT.line-0.5)*0.22;
      let f=(idx===0?0.38:0.62)+lineShift;
      if(TT.bunker>0.5) f=(idx===0?0.28:0.48)+lineShift*0.5;
      const bx=own.x+(ball.x-own.x)*f, by=own.y+(ball.y-own.y)*f;
      const e=EDGES[GOAL_EDGE[p.team]];
      steer(p, bx+e.ux*(idx===0?34:-34), by+e.uy*(idx===0?34:-34), 2.0);
    } else {
      const TT=T(p.team);
      if(TT.bunker>0.5&&p.role==="M"){    // bus: the mid drops in (partial — the refund)
        steer(p, own.x+(ball.x-own.x)*0.62, own.y+(ball.y-own.y)*0.62, 2.0);
        return;
      }
      if(TT.bunker>0.5&&p.role==="F"){    // lone outlet holds the counter station
        steer(p,(own.x+tgt.x)/2,(own.y+tgt.y)/2,2.0);
        return;
      }
      const f=p.role==="M"?0.45:(0.72+(TT.direct-0.5)*0.26);
      let sx=ball.x+(tgt.x-ball.x)*f, sy=ball.y+(tgt.y-ball.y)*f;
      const side=(p.role==="M"?1:-1);
      // fan out as play compresses near the target goal — width instead of pile-in
      const dBallGoal=dist(ball,tgt);
      const spread=55+Math.max(0,(230-dBallGoal))*0.45;
      const ang=Math.atan2(tgt.y-ball.y,tgt.x-ball.x)+Math.PI/2;
      sx+=Math.cos(ang)*spread*side; sy+=Math.sin(ang)*spread*side;
      steer(p,sx,sy,2.0);
    }
  });
  // separation (gentler, timestep-scaled)
  const sepS=Math.min(1,dt*60);
  for(let i=0;i<players.length;i++)for(let j=i+1;j<players.length;j++){
    const a=players[i],b=players[j];
    if(a.out||b.out)continue;
    const d=dist(a,b);
    if(d<26&&d>0.01){const push=(26-d)/26*0.45*sepS, dx=(a.x-b.x)/d, dy=(a.y-b.y)/d;
      a.vx+=dx*push;a.vy+=dy*push;b.vx-=dx*push;b.vy-=dy*push;}
  }
  // owner decisions
  if(owner){
    if(holdActive){ owner.vx*=0.85; owner.vy*=0.85; return; }
    if(throwPending===owner){
      throwPending=null;
      const mates=players.filter(m=>m.team===owner.team&&m!==owner&&!m.out&&!m.sentOff);
      let pickM=null,bs=-1e9;
      mates.forEach(m=>{
        const d=dist(m,owner); if(d<40||d>240)return;
        let laneOk=true;
        players.forEach(o2=>{ if(o2.team===owner.team||o2.out||o2.sentOff)return;
          for(let t2=0.2;t2<1;t2+=0.2){ const lx=owner.x+(m.x-owner.x)*t2, ly=owner.y+(m.y-owner.y)*t2;
            if(Math.hypot(o2.x-lx,o2.y-ly)<24) laneOk=false;}});
        const sc=(laneOk?0:-500)-d*0.3+Math.random()*20;
        if(sc>bs){bs=sc;pickM=m;}
      });
      if(!pickM&&mates.length) pickM=mates.sort((a,b)=>dist(a,owner)-dist(b,owner))[0];
      if(!pickM){
        const allies=players.filter(m=>allied(owner.team,m.team)&&!m.out&&!m.sentOff&&m.role!=="K"
          &&dist(m,owner)>40&&dist(m,owner)<260)
          .sort((a,b)=>dist(a,owner)-dist(b,owner));
        if(allies.length){ pickM=allies[0]; }
      }
      if(pickM){
        kick(pickM.x+pickM.vx*8, pickM.y+pickM.vy*8, Math.min(7,4+dist(pickM,owner)*0.02), false);
        if(allied(owner.team,pickM.team)) ball.allyPass=true;
        return;
      }
      // truly alone in the world — he plays on himself, dribbling in
      return;
    }
    if(cornerTaker===owner){
      cornerTaker=null;
      const e2=EDGES[GOAL_EDGE[cornerGoal]], g=goalCenter(cornerGoal);
      const off2=(Math.random()*2-1)*e2.len*GOAL_HALF*0.7;
      const txc=g.x+e2.ux*off2+e2.nx*44, tyc=g.y+e2.uy*off2+e2.ny*44;
      kick(txc,tyc,7.2,false);
      ball.zv=3.0;                       // it swings in high, whatever the distance
      cornerGoal=null;
      return;
    }
    if(penaltyShooter===owner){
      penaltyShooter=null;
      const e=EDGES[GOAL_EDGE[penaltyGoalTeam]], g=goalCenter(penaltyGoalTeam);
      const off2=(Math.random()*2-1)*e.len*GOAL_HALF*1.0;
      stats.shots[owner.team]++;
      kick(g.x+e.ux*off2, g.y+e.uy*off2, 10.8, true);
      return;
    }
    if(owner.role==="K"){
      const og=goalCenter(owner.team);
      let best=null,bd=1e9;
      players.forEach(m=>{ if(m.team===owner.team&&!m.out&&!m.sentOff&&(m.role==="M"||m.role==="F")){
        const d=dist(m,owner); if(d<bd){bd=d;best=m;}}});
      if(best){
        let tx=best.x+best.vx*10, ty=best.y+best.vy*10;
        if(Math.hypot(tx-og.x,ty-og.y)<dist(owner,og)+30){ tx=CX; ty=CY; }
        kick(tx,ty,Math.min(9,bd*0.05+4));
      } else kick(CX,CY,8);
      return;
    }
    const tgt=goalCenter(targets[owner.team]);
    const e=EDGES[GOAL_EDGE[targets[owner.team]]];
    const dGoal=dist(owner,tgt);
    let pressure=1e9; oppOf(owner.team).forEach(o=>pressure=Math.min(pressure,dist(o,owner)));
    // pinned on the touchline under pressure: don't grind — play the outlet
    {
      let wd=1e9,we=null;
      for(const e2 of EDGES){const d2=(owner.x-e2.p1.x)*e2.nx+(owner.y-e2.p1.y)*e2.ny;if(d2<wd){wd=d2;we=e2;}}
      const mouth=we&&we.goal&&Math.abs((owner.x-we.mx)*we.ux+(owner.y-we.my)*we.uy)<we.len*GOAL_HALF*1.3;
      if(wd<34&&pressure<58&&!mouth&&Math.random()<0.22*dt*60){
        let best=null,bs=1e9;
        players.forEach(m=>{if(m.team===owner.team&&m!==owner&&!m.out&&!m.sentOff&&m.role!=="K"){
          const dc=dist(m,{x:CX,y:CY}); if(dc<bs){bs=dc;best=m;}}});
        if(best) kick(best.x+best.vx*8,best.y+best.vy*8,Math.min(9,dist(best,owner)*0.045+4.5));
        else kick(CX,CY,7);
        return;
      }
    }
    {
      const RK=T(owner.team).risk;
      // THE LONG STRIKE: open lane + decent angle + space = have a go from range
      if(dGoal>125&&dGoal<250&&pressure>42){
        const hw2=e.len*GOAL_HALF;
        const latOff=Math.abs((owner.x-tgt.x)*e.ux+(owner.y-tgt.y)*e.uy);
        if(latOff<hw2*1.5){
          let laneClear=true;
          oppOf(owner.team).forEach(o=>{
            const tt=((o.x-owner.x)*(tgt.x-owner.x)+(o.y-owner.y)*(tgt.y-owner.y))/(dGoal*dGoal);
            if(tt>0.12&&tt<0.85){const lx=owner.x+(tgt.x-owner.x)*tt,ly=owner.y+(tgt.y-owner.y)*tt;
              if(o.role!=="K"&&Math.hypot(o.x-lx,o.y-ly)<26)laneClear=false;}
          });
          if(laneClear&&Math.random()<0.016*(0.4+1.2*RK)*dt*60){
            const scL=(0.6+0.8*RK)*(0.75+dGoal*0.0035);   // range punishes accuracy
            const offL=(Math.random()*2-1)*hw2*scL;
            spawnNote(owner.x,owner.y-24,"from distance!",TEAMS[owner.team].accent);
            if(Math.random()<0.4) say(pick([
              `${owner.name} sees the lane and LETS FLY from range!`,
              `${owner.name} has a go from distance — dip and swerve!`,
              `No hesitation — ${owner.name} rips one from ${Math.round(dGoal/8)} yards!`,
              `${owner.name} says why not, and unloads!`]),true);
            kick(tgt.x+e.ux*offL, tgt.y+e.uy*offL, 11.2, true);
            return;
          }
        }
      }
      if(dGoal<(150+50*RK) && Math.random()<0.025*(0.5+1.0*RK)*dt*60){
        let sc=0.6+0.8*RK;                                   // patience = precision
        if(T(targets[owner.team]).bunker>0.5) sc*=1.35;      // packed boxes deflect
        const off=(Math.random()*2-1)*e.len*GOAL_HALF*sc;
        kick(tgt.x+e.ux*off, tgt.y+e.uy*off, 9.5+Math.random()*1.5, true);
        return;
      }
    }
    if(pressure<48 && Math.random()<(0.05+0.10*T(owner.team).tempo)*dt*60){
      let best=null,bs=-1e9;
      const matesLeft=FL[owner.team]-(owner.role!=="K"?1:0);
      let allyPen=null;   // computed once: identical for every allied candidate
      {
        const foe=targets[owner.team];
        if(foe!==null){
          const foeLead=score[foe]-score[owner.team];
          const shortfall=FL[foe]-FL[owner.team];
          let desp=Math.max(0,foeLead)*0.28+Math.max(0,shortfall)*0.4+(FL[owner.team]===0?0.45:0);
          let pen=850*Math.max(0,1-desp);
          if(matesLeft===0) pen-=80;
          if(pressure>32) pen*=0.8;
          allyPen=pen;
        }
      }
      players.forEach(m=>{
        const allyOk=allied(owner.team,m.team);
        if((m.team!==owner.team&&!allyOk)||m===owner||m.role==="K"||m.out||m.sentOff)return;
        const d=dist(m,owner); if(d<60||d>210+140*T(owner.team).direct)return;
        const gain=dist(owner,tgt)-dist(m,tgt);
        let laneOk=true;
        oppOf(owner.team).forEach(o=>{
          if(allied(owner.team,o.team))return;   // allies don't block the lane story
          const t=((o.x-owner.x)*(m.x-owner.x)+(o.y-owner.y)*(m.y-owner.y))/(d*d);
          if(t>0.1&&t<0.9){const lx=owner.x+(m.x-owner.x)*t, ly=owner.y+(m.y-owner.y)*t;
            if(Math.hypot(o.x-lx,o.y-ly)<(30-12*T(owner.team).risk)+5*(T(o.team).press-0.5)*2) laneOk=false;}
        });
        let s=gain*(0.6+0.8*T(owner.team).direct)+(laneOk?0:-500)+Math.random()*30;
        if(allyOk&&allyPen!==null) s-=allyPen;   // scoreboard-priced treason, computed once above
        if(s>bs){bs=s;best=m;}
      });
      if(best&&bs>-100){
        kick(best.x+best.vx*8, best.y+best.vy*8, Math.min(9,dist(best,owner)*0.045+4));
        if(allied(ball.lastKicker?ball.lastKicker.team:-1,best.team)) ball.allyPass=true;
        return;
      }
    }
    // FOULS: clumsy or cynical challenges — aggression is now a priced behavior
    for(const o of oppOf(owner.team)){
      if(o.role==="K"||o.out||o.sentOff)continue;
      if(suppress&&suppress.team===o.team&&clockSec<suppress.until)continue;
      if(dist(o,owner)>=28)continue;
      const inBox=dist(owner,goalCenter(o.team))<110;
      const fc=(holdActive?0:0.0022)*foulMult*AGG_PRESETS[teamAGG[o.team]].f
        *(0.4+1.2*T(o.team).press*(coalAlly[o.team]?0.7:1))*(1.5-0.7*o.stamina)*(inBox?0.4:1.0);
      if(Math.random()<fc*dt*60){
        const victim=owner;
        spawnNote(victim.x,victim.y-24,"FOUL!","#ffd166");
        addStoppage(1.2);
        const r=Math.random();
        const redP=0.035*(0.5+0.5*foulMult);   // stricter referees reach for red
        const yelP=0.20*(0.6+0.4*foulMult);
        let card=null;
        if(r<redP) card="red";
        else if(r<redP+yelP) card=(o.yellows>=1)?"second":"yellow";
        if(card==="yellow") o.yellows++;
        let off=(card==="red"?pick(RED_OFFENSES):pick(YELLOW_OFFENSES)).replaceAll("{V}",victim.name);
        if(AGG_PRESETS[teamAGG[o.team]].f>1.5&&coached[o.team]) off+=" — entirely on the manager's instructions";
        const shortT=TEAMS[o.team].short, col=TEAMS[o.team].color;
        if(inBox){
          pendingPenalty={shooter:victim, conceder:o.team};
          addStoppage(4);
        } else {
          suppress={team:o.team, until:clockSec+1.0};
        }
        const penTag=inBox?` <b style="color:#ffd166">AND IT'S A PENALTY!</b>`:"";
        if(card==="red"||card==="second"){
          addStoppage(3);
          o.sentOff=true; o.redCard=true; walkPending=o;   // the walk follows the popup
          const left=players.filter(q=>q.team===o.team&&!q.out&&!q.sentOff).length;
          const leftTxt=left===1?`only the goalkeeper remains for ${tm(o.team)}!`:`${tm(o.team)} down to ${left} men.`;
          showNotice(col, card==="second"?"🟨🟥 SECOND YELLOW":"🟥 RED CARD",
            `${o.name} (${shortT})`,
            `His crime: he ${off}.${penTag}<br>OFF! The walk of shame begins — ${leftTxt}`, 5200);
          say(`🟥 <b>RED CARD!</b> ${o.name} is off — he ${off}. ${tm(o.team)} play on a man short!`,true);
        } else if(card==="yellow"){
          addStoppage(3);
          showNotice(col,"🟨 YELLOW CARD",`${o.name} (${shortT})`,
            `His crime: he ${off}. Into the book he goes.${penTag}`, 4200);
          say(`🟨 ${o.name} is booked — ${off}.`,true);
        } else if(inBox){
          showNotice(TEAMS[victim.team].color,"⚠️ PENALTY!",
            `${victim.name} is brought down in the box!`,
            `${o.name} ${off} — the referee points to the spot.`, 4600);
          say(`<b style="color:${TEAMS[victim.team].color}">PENALTY to ${tm(victim.team)}!</b>`,true);
        } else if(Math.random()<0.5){
          say(pick([
            `Free kick — ${o.name} ${off}.`,
            `The whistle goes. ${o.name} ${off}.`,
            `Referee's seen it: ${o.name} ${off}. Free kick.`]));
        }
        return;
      }
    }
    // tackles (fatigue and momentum affect steal odds; radius sits just outside body contact)
    oppOf(owner.team).forEach(o=>{
      if(suppress&&suppress.team===o.team&&clockSec<suppress.until) return;
      let tc=holdActive?0:0.010*(0.6+0.8*T(o.team).press)*AGG_PRESETS[teamAGG[o.team]].t; // aggression bites harder; dead balls untouchable
      tc*=(0.55+0.45*o.stamina);             // fresh tacklers bite harder
      tc*=(1.35-0.5*owner.stamina);          // gassed carriers are easier to rob
      if(momentumOn&&clockSec<boostUntil[o.team]) tc*=1.3;
      if(dist(o,owner)<26 && Math.random()<tc*dt*60){   // MUST stay > body radius 23
        const victim=owner;
        ball.owner=o; ball.lastTouch=o.team; ball.lastKicker=o; ball.isShot=false;
        if(o.role==="K"){
          // keeper smothering a dribbler is goalkeeping, not a tackle — no tackle credit
          spawnNote(o.x,o.y-20,"smothered!",TEAMS[o.team].color,TEAMS[o.team].accent);
        } else {
          stats.tackles[o.team]++; o.tackles++;
          spawnNote(o.x,o.y-20,"tackle!",TEAMS[o.team].color,TEAMS[o.team].accent);
        }
        stam(o,+0.10); stam(victim,-0.12);
        if(o.role!=="K" && Math.random()<0.28) say(pick([
          `${o.name} muscles ${victim.name} off the ball!`,
          `Crunching challenge — ${o.name} strips it from ${victim.name}.`,
          `${o.name} picks ${victim.name}'s pocket!`,
          `${victim.name} dwells too long and ${o.name} makes him pay.`,
          `Textbook from ${o.name} — shoulder in, ball won, no arguments.`,
          `${o.name} reads it like a bedtime story. Possession stolen.`,
          `Nothing gentle about that — ${o.name} simply takes it off ${victim.name}.`,
          `${victim.name} had it on a plate and ${o.name} ate first.`,
          `${o.name} arrives like a tax bill. ${victim.name} pays in full.`]));
      }
    });
  }
}

// ---------- Physics ----------
function physics(dt){
  const S=dt*60;
  players.forEach(p=>{
    if(p.out)return;
    const pv=Math.hypot(p.vx,p.vy);
    if(pv>0.15){ p.hx=p.hx*0.85+(p.vx/pv)*0.15; p.hy=p.hy*0.85+(p.vy/pv)*0.15; }
    p.x+=p.vx*S; p.y+=p.vy*S;
    const staging=(pendingRestart&&pendingRestart.p===p)||cornerTaker===p||throwPending===p;
    if(!p.sentOff&&!staging) clampInside(p, p.role==="K"?12:14);
    const v=Math.hypot(p.vx,p.vy), effort=v/2.35;
    p.stamina-=effort*effort*0.0012*S*(0.85+0.5*T(p.team).press*(coalAlly[p.team]?0.7:1));
    p.stamina+=0.0004*S;
    p.stamina=Math.max(0,Math.min(1,p.stamina));
  });
  // hard body collision: players are solid — resolve overlaps positionally (2 passes)
  if(zoneRule){
    players.forEach(p=>{ if(p.out||p.sentOff)return;
      for(let t=0;t<3;t++){ if(t===p.team)continue;
        const g=goalCenter(t);
        if(dist(ball,g)<110)continue;            // ball is in — the zone is open
        if(ball.z>4&&dist(ball,g)<260&&((g.x-ball.x)*ball.vx+(g.y-ball.y)*ball.vy)>0)continue; // timed run: the cross is inbound
        const d=dist(p,g);
        if(d<112){ p.x=g.x+(p.x-g.x)/(d||1)*112; p.y=g.y+(p.y-g.y)/(d||1)*112; }
      }
    });
  }
  const BODY=23;
  for(let pass=0;pass<2;pass++){
    for(let i=0;i<players.length;i++)for(let j=i+1;j<players.length;j++){
      const a=players[i],b=players[j];
      if(a.out||b.out)continue;
      const dx=a.x-b.x, dy=a.y-b.y, d=Math.hypot(dx,dy);
      if(d<BODY&&d>0.01){
        const push=(BODY-d)/2, ux=dx/d, uy=dy/d;
        a.x+=ux*push; a.y+=uy*push; b.x-=ux*push; b.y-=uy*push;
      }
    }
    players.forEach(p=>{ if(!p.sentOff&&!((pendingRestart&&pendingRestart.p===p)||cornerTaker===p||throwPending===p)) clampInside(p, p.role==="K"?12:14); });
  }
  if(ball.owner){
    const o=ball.owner, v=Math.hypot(o.vx,o.vy);
    stats.poss[o.team]+=S;
    if(v>0.1){ o.hx=o.hx*0.85+(o.vx/v)*0.15; o.hy=o.hy*0.85+(o.vy/v)*0.15; }
    const hl=Math.hypot(o.hx,o.hy)||1, hx=o.hx/hl, hy=o.hy/hl;
    // hybrid dribble: the ball is its own body, spring-following the carry point
    const cpx=o.x+hx*15, cpy=o.y+hy*15;
    ball.vx+=(cpx-ball.x)*0.08*S; ball.vy+=(cpy-ball.y)*0.08*S;
    ball.vx*=Math.pow(0.90,S); ball.vy*=Math.pow(0.90,S);
    ball.x+=ball.vx*S; ball.y+=ball.vy*S;
    ball.touchT-=dt;
    if(ball.touchT<=0 && dist(ball,o)<18){
      // take a touch — long in space, short under pressure
      let pr=1e9; players.forEach(q=>{ if(q.team!==o.team&&!q.out){const d=dist(q,o); if(d<pr)pr=d;}});
      const long=pr>70;
      ball.vx+=hx*(long?3.6:2.2); ball.vy+=hy*(long?3.6:2.2);
      ball.touchT=long?0.75:0.45;
    }
    // heavy touch: the ball got away — it's anyone's now
    if(dist(ball,o)>30){
      ball.strayer=o; ball.strayF=54;
      ball.owner=null; ball.noClaim=o; ball.noClaimF=8;
    }
    if(o.team!==lastPossessTeam){
      if(clockSec-lastPossessComment>6 && lastPossessTeam!==null){
        lastPossessComment=clockSec;
        say(pick([
          `${o.name} wins it for ${tm(o.team)}.`,
          `${tm(o.team)} on the ball — ${o.name} carries.`,
          `Turnover! ${o.name} takes charge for ${tm(o.team)}.`,
          `New chapter: ${tm(o.team)} in possession through ${o.name}.`,
          `${o.name} gathers, and ${tm(o.team)} start to build.`,
          `The ball changes flags — ${tm(o.team)} have it now.`,
          `${o.name} on it, head up, options everywhere.`,
          `Possession swings to ${tm(o.team)}. The hex spins on.`]));
      }
      lastPossessTeam=o.team;
    }
  } else {
    const px0=ball.x, py0=ball.y;
    ball.x+=ball.vx*S; ball.y+=ball.vy*S;
    ball.vx*=Math.pow(0.985,S); ball.vy*=Math.pow(0.985,S);
    // flight and landing
    if(ball.z>0||ball.zv>0){
      ball.z+=ball.zv*S; ball.zv-=0.14*S;
      if(ball.z<=0){
        ball.z=0; ball.zv=0;
        const near=players.filter(p=>!p.out&&dist(p,ball)<62);
        const teams=new Set(near.map(p=>p.team));
        if(near.length>=2&&teams.size>=2){
          // header duel — highest man wins
          let win=null,wt=0;
          near.forEach(p=>{const w=(1/(dist(p,ball)+8))*(0.6+0.8*Math.random()); if(w>wt){wt=w;win=p;}});
          const tgt2=goalCenter(targets[win.team]??win.team);
          ball.lastTouch=win.team; ball.lastKicker=win;
          spawnNote(ball.x,ball.y-24,"header!",TEAMS[win.team].color,TEAMS[win.team].accent);
          if(Math.random()<0.4) say(pick([
            `${win.name} rises highest!`,
            `Up goes ${win.name} — wins it in the air!`,
            `${win.name} climbs above the crowd!`,
            `${win.name} hangs in the air like laundry — and wins it!`,
            `Aerial duel... it's ${win.name} who gets the touch!`,
            `${win.name} out-jumps the lot of them!`,
            `The ball drops into a forest of heads — ${win.name}'s is tallest.`,
            `Meet it? ${win.name} MARRIES it!`]));
          if(targets[win.team]!==null&&dist(ball,tgt2)<160&&win.role!=="K"){
            const e2=EDGES[GOAL_EDGE[targets[win.team]]];
            const off2=(Math.random()*2-1)*e2.len*GOAL_HALF*1.35;
            const ddx=tgt2.x+e2.ux*off2-ball.x, ddy=tgt2.y+e2.uy*off2-ball.y, dl2=Math.hypot(ddx,ddy)||1;
            ball.vx=ddx/dl2*8.5; ball.vy=ddy/dl2*8.5; ball.isShot=true;
            stats.shots[win.team]++;
            spawnPing(ball.x,ball.y,TEAMS[win.team].color);
          } else {
            const ddx=tgt2.x-ball.x, ddy=tgt2.y-ball.y, dl2=Math.hypot(ddx,ddy)||1;
            ball.vx=ddx/dl2*5; ball.vy=ddy/dl2*5;
          }
          ball.noClaim=win; ball.noClaimF=10;
        }
      }
    }
    if(ball.noClaimF>0) ball.noClaimF-=S; else ball.noClaim=null;
    if(ball.strayF>0) ball.strayF-=S; else ball.strayer=null;
    let best=null,bd=1e9;
    if(performance.now()<restartHold&&!ball.owner) return;   // dead ball awaits its taker
    players.forEach(p=>{ if(p.out||p.sentOff)return; if(p===ball.noClaim&&ball.noClaimF>0)return;
      if(suppress&&suppress.team===p.team&&clockSec<suppress.until)return;
      if(ball.z>(p.role==="K"?28:12))return;   // sailing over their heads
      const sx=ball.x-px0, sy=ball.y-py0, sl=sx*sx+sy*sy;
      let t=sl>0?((p.x-px0)*sx+(p.y-py0)*sy)/sl:0;
      t=Math.max(0,Math.min(1,t));
      const d=Math.hypot(p.x-(px0+sx*t), p.y-(py0+sy*t));
      const reach=p.role==="K"?17:13;
      if(d<reach&&d<bd){bd=d;best=p;}});
    if(best){
      const wasShot=ball.isShot, spd=Math.hypot(ball.vx,ball.vy), kicker=ball.lastKicker;
      const strayer=(ball.strayF>0)?ball.strayer:null;
      if(ball.allyPass&&ball.lastKicker&&best.team!==ball.lastKicker.team&&allied(ball.lastKicker.team,best.team)
        &&Math.random()<0.5){
        say(pick([
          `The alliance is real — ${ball.lastKicker.name} slips it to ${best.name}!`,
          `Enemy of my enemy: ${ball.lastKicker.name} finds ${best.name} across battle lines!`,
          `A pass BETWEEN teams! ${ball.lastKicker.name} to ${best.name} — the leader should worry.`,
          `${ball.lastKicker.name} and ${best.name} wear different shirts and share one grudge.`]),true);
      }
      ball.allyPass=false;
      ball.owner=best; ball.lastTouch=best.team; ball.x=best.x; ball.y=best.y; ball.isShot=false;
      ball.touchT=0.3; ball.strayer=null; ball.strayF=0;
      ball.lastKicker=best;   // person-level attribution follows possession
      if(strayer && best.team!==strayer.team){
        // won it off the dribbler's touch — positional dispossession
        stam(best,+0.08); stam(strayer,-0.08);
        if(best.role==="K"){
          spawnNote(best.x,best.y-20,"smothered!",TEAMS[best.team].color,TEAMS[best.team].accent);
        } else {
          stats.tackles[best.team]++; best.tackles++;
          spawnNote(best.x,best.y-20,"poked away!",TEAMS[best.team].color,TEAMS[best.team].accent);
        }
      } else
      if(wasShot && best.role==="K" && kicker && best.team!==kicker.team && spd>5){
        // a save: keeper glory, shooter deflation
        stats.saves[best.team]++; best.saves++;
        stam(best,+0.12); stam(kicker,-0.05);
        if(spd>8.5 && Math.random()<0.4){
          // parried! pushed wide, not held
          const e2=EDGES[GOAL_EDGE[best.team]];
          const hw3=e2.len*GOAL_HALF;
          const along=(best.x-e2.mx)*e2.ux+(best.y-e2.my)*e2.uy;
          const lat=along>=0?1:-1;                    // push toward the NEARER post
          const need=(hw3+16)-lat*along;              // enough lateral to clear the mouth
          let dx3=e2.ux*lat*need-e2.nx*10, dy3=e2.uy*lat*need-e2.ny*10;
          const dl3=Math.hypot(dx3,dy3)||1;
          ball.owner=null; ball.lastTouch=best.team; ball.lastKicker=best;
          ball.vx=dx3/dl3*spd*0.68; ball.vy=dy3/dl3*spd*0.68;
          ball.noClaim=best; ball.noClaimF=10; ball.isShot=false;
          spawnNote(best.x,best.y-22,"tipped wide!","#ffd166");
          if(Math.random()<0.6) say(pick([
            `${best.name} can only parry it away!`,
            `Strong hands from ${best.name} — pushed wide, still live!`,
            `${best.name} tips it around... danger not cleared!`,
            `Too hot to hold — ${best.name} beats it away!`,
            `${best.name} punches it clear... straight into the chaos!`,
            `Fingertips from ${best.name}! The ball is still loose!`,
            `${best.name} gets SOMETHING on it — scramble on!`]),true);
          return;
        }
        spawnNote(best.x,best.y-20,"SAVE!","#ffd166");
        if(Math.random()<0.5) say(pick([
          `<span class="goal">SAVE!</span> ${best.name} denies ${kicker.name}!`,
          `What a stop by ${best.name} — ${kicker.name} can't believe it!`,
          `${kicker.name} lets fly... ${best.name} gets a strong hand to it!`,
          `${best.name} says NO. Emphatically.`,
          `Robbed! ${kicker.name} had the whole goal and ${best.name} shrank it.`,
          `${best.name} swallows it whole. ${kicker.name} kicks the turf.`,
          `That's a save they'll replay — ${best.name} at full stretch!`,
          `${kicker.name} picks his spot... ${best.name} was already there.`,
          `The wall has a name, and it's ${best.name}.`]),true);
      } else if(kicker && spd>2.2 && best!==kicker){
        if(best.team===kicker.team){
          // completed pass: small lift for both
          stam(kicker,+0.05); stam(best,+0.03);
          if(Math.random()<0.22) spawnNote(best.x,best.y-20,"pass ✓",TEAMS[best.team].color,TEAMS[best.team].accent);
        } else if(!wasShot){
          // interception: passer punished, thief energized
          stam(kicker,-0.08); stam(best,+0.06);
          spawnNote(best.x,best.y-20,"intercepted!",TEAMS[best.team].color,TEAMS[best.team].accent);
        }
      }
    }
  }
  // walls & goals
  for(let k=0;k<6;k++){
    const e=EDGES[k];
    const d=(ball.x-e.p1.x)*e.nx+(ball.y-e.p1.y)*e.ny;
    if(d<7){
      const along=(ball.x-e.mx)*e.ux+(ball.y-e.my)*e.uy;
      const gTeam=e.goal?GOAL_EDGE.indexOf(k):-1;
      const inMouth=e.goal && !out[gTeam] && Math.abs(along)<e.len*GOAL_HALF;
      if(inMouth){
        if(d<-6){
          if(ball.z<28){ goalScored(GOAL_EDGE.indexOf(k)); return; }
          else if(ball.isShot){ spawnNote(ball.x,ball.y-20,"over the bar!","#ffd166"); ball.isShot=false; }
          if(oobRule){ outOfBounds(k,e); return; }
        }
      } else if(oobRule){
        if(d<2){
          if(ball.isShot && ball.lastKicker){
            say(pick([
              `${ball.lastKicker.name} drags it wide!`,
              `Off target — ${ball.lastKicker.name} will want that one back.`,
              `${ball.lastKicker.name} leans back and it sails over!`,
              `Row Z! ${ball.lastKicker.name} tests the crowd's reflexes.`,
              `${ball.lastKicker.name} sends a postcard to the corner flag.`,
              `Wide! The ${TEAMS[ball.lastKicker.team].name} fans behind the goal duck as one.`]));
            ball.isShot=false;
          }
          outOfBounds(k,e); return;
        }
      } else {
        if(ball.isShot && ball.lastKicker){
          say(pick([
            `${ball.lastKicker.name} drags it wide!`,
            `Off target — ${ball.lastKicker.name} will want that one back.`,
            `${ball.lastKicker.name} shoots... nowhere near it.`,
            `That's closer to the dugout than the goal, ${ball.lastKicker.name}.`,
            `${ball.lastKicker.name} snatches at it — wide and not by a little.`,
            `The shot everyone forgets by full time. Except ${ball.lastKicker.name}.`,
            `${ball.lastKicker.name} with the ambition, not the accuracy.`]));
          ball.isShot=false;
        }
        ball.x+=e.nx*(7-d); ball.y+=e.ny*(7-d);
        const vn=ball.vx*e.nx+ball.vy*e.ny;
        if(vn<0){ ball.vx-=2*vn*e.nx*0.82; ball.vy-=2*vn*e.ny*0.82; }
        ball.vx+=e.nx*0.5; ball.vy+=e.ny*0.5;   // nudge infield so play comes off the wall
      }
    }
  }
}

function goalScored(concederTeam){
  const scorerTeam=ball.lastTouch;
  const scorer=(ball.owner&&ball.owner.team===scorerTeam)?ball.owner
    :((ball.lastKicker&&ball.lastKicker.team===scorerTeam)?ball.lastKicker:null);
  const wasLeader=leaderIdx();
  // true underdog test: someone ranked STRICTLY above the scorer before this goal
  const wasTrailing=(scorerTeam!==null)&&[0,1,2].some(o=>!out[o]&&o!==scorerTeam&&rankCmp(o,scorerTeam)<0);
  const legit=(scorerTeam!==null && scorerTeam!==concederTeam);
  conceded[concederTeam]++; score[concederTeam]--;
  if(legit){ score[scorerTeam]++; scored[scorerTeam]++; }
  const keeper=players.find(p=>p.team===concederTeam&&p.role==="K");
  const name=legit?((scorer&&scorer.team===scorerTeam)?scorer.name:TEAMS[scorerTeam].name):null;
  if(legit&&scorer&&scorer.team===scorerTeam){ scorer.goals++; stam(scorer,+0.2); }
  goalsLog.push({t:clockSec,name:name||TEAMS[concederTeam].name,scorer:legit?scorerTeam:null,conceder:concederTeam,own:!legit,ot:phase==="overtime"});

  // ---- overtime rules: concede and you're out; golden goal decides it ----
  if(phase==="overtime"){
    if(otGolden || aliveTeams().length===2){
      // two left: this goal settles it
      const champ=legit?scorerTeam:aliveTeams().find(t=>t!==concederTeam);
      if(legit&&scorer&&scorer.team===scorerTeam) goldenScorer=scorer;
      say(`<span class="goal">⚽ GOLDEN GOAL!</span> ${name??tm(champ)} settles it!`,true);
      crownChampion(champ, legit?`golden goal by ${name}`:`golden goal — own-goal heartbreak for ${TEAMS[concederTeam].name}`);
      return;
    }
    // three left: the conceder is eliminated, survivors play golden goal
    say(`<span class="goal">💀 ELIMINATED!</span> ${tm(concederTeam)} concede in overtime and they're OUT!`,true);
    eliminateTeam(concederTeam);
    otGolden=true;
    const survivors=aliveTeams();
    showCelebration(TEAMS[concederTeam].color,"💀 ELIMINATED!",
      `${tm(concederTeam)} are out`,
      `${legit?name+" delivers the killing blow":"an own goal ends it"} — ${tm(survivors[0])} v ${tm(survivors[1])}, next goal wins`,"");
    say(`Golden goal! ${tm(survivors[0])} against ${tm(survivors[1])} — next goal takes the title!`,true);
    computeTargets();
    flash(concederTeam);
    pendingKickoff=survivors[Math.floor(Math.random()*2)];
    return;
  }

  // ---- regulation ----
  let caughtFire=false;
  if(legit){
    const scoreline=scoreMode==="conceded"
      ?`${tm(concederTeam)} now ${conceded[concederTeam]} conceded`
      :`${tm(scorerTeam)} +1, ${tm(concederTeam)} −1`;
    say(pick([
      `<span class="goal">⚽ GOOOAL!</span> ${name} beats ${keeper.name} — ${scoreline}!`,
      `<span class="goal">⚽ GOOOAL!</span> ${name} finds the net! ${scoreline}!`,
      `<span class="goal">⚽ IT'S IN!</span> ${keeper.name} rooted — ${name} scores! ${scoreline}!`,
      `<span class="goal">⚽ GOOOAL!</span> ${name} with ice in the veins — ${scoreline}!`,
      `<span class="goal">⚽ GOOOAL!</span> Nothing ${keeper.name} could do! ${name}! ${scoreline}!`,
      `<span class="goal">⚽ THE NET BULGES!</span> ${name}! ${scoreline}!`,
      `<span class="goal">⚽ GOOOAL!</span> ${name} writes his name on this match — ${scoreline}!`]),true);
    if(momentumOn && wasTrailing){
      boostUntil[scorerTeam]=clockSec+20;
      caughtFire=true;
      say(pick([
        `${tm(scorerTeam)} catch fire! 🔥 The underdogs are flying for the next 20 seconds.`,
        `🔥 Belief is a fuel — ${tm(scorerTeam)} are burning it! 20 seconds of fury!`,
        `The comeback spark! 🔥 ${tm(scorerTeam)} find another gear!`,
        `🔥 ${tm(scorerTeam)} down but never out — they're FLYING now!`,
        `Someone lit the touchpaper — ${tm(scorerTeam)} are ablaze! 🔥`]),true);
    }
    showCelebration(TEAMS[scorerTeam].color, "⚽ GOOOAL!",
      `<b>${name}</b> — ${tm(scorerTeam)}`,
      `beats ${keeper.name} · ${tm(concederTeam)} concede (${conceded[concederTeam]})`,
      caughtFire?`🔥 ${TEAMS[scorerTeam].name} catch fire — 20s boost!`:"");
  } else {
    say(`<span class="goal">⚽ Own goal!</span> Chaos in the box and ${tm(concederTeam)} put it in their own net.`,true);
    showCelebration(TEAMS[concederTeam].color, "😱 OWN GOAL!",
      `${tm(concederTeam)} concede`,
      `chaos in the box — it's in their own net (${conceded[concederTeam]} conceded)`, "");
  }
  computeTargets();
  flash(concederTeam); if(legit) flash(scorerTeam);
  pendingKickoff=concederTeam;   // kickoff happens after the celebration clears
}

function eliminateTeam(t){
  out[t]=true;
  if(goalEls[t]) goalEls[t].setAttribute("opacity",.3);   // the goal seals
  coached[t]=false; coachTarget[t]=null; if(activeCoach===t)activeCoach=null;
  players.forEach(p=>{ if(p.team===t){ p.out=true; if(ball.owner===p) ball.owner=null; }});
  if(ball.lastKicker&&ball.lastKicker.out) ball.isShot=false;
}
function buildMatchReport(){
  const totPoss=stats.poss.reduce((a,b)=>a+b,0)||1;
  const idOf=t=>`${teamATK[t]} · ${teamDEF[t]} · ${teamAGG[t]}`;
  let md=`# Three-Sided World Cup — Match Report\n\n`;
  md+=`*${new Date().toLocaleString()}*\n\n`;
  md+=`## Lineup\n\n`;
  for(let t=0;t<3;t++)
    md+=`- **${TEAMS[t].name}** (${TEAMS[t].short}) — ${idOf(t)} — ⭐ ${TEAMS[t].star}\n`;
  if(champInfo) md+=`\n## 🏆 ${TEAMS[champInfo.t].name} are champions — ${champInfo.how}\n`;
  md+=`\n## Final\n\n| Team | Pts | G | Sv | Tk | Poss |\n|---|---|---|---|---|---|\n`;
  for(const m of [0,1,2].sort(rankCmp))
    md+=`| ${TEAMS[m].short} | ${score[m]>0?"+":""}${score[m]} | ${scored[m]} | ${stats.saves[m]} | ${stats.tackles[m]} | ${Math.round(100*stats.poss[m]/totPoss)}% |\n`;
  md+=`\n## Goals\n\n`;
  if(!goalsLog.length) md+=`None. A siege.\n`;
  goalsLog.forEach(g=>{
    const mm2=String(Math.floor(g.t/60)).padStart(2,"0"), ss2=String(Math.floor(g.t%60)).padStart(2,"0");
    md+=g.own?`- 😱 ${mm2}:${ss2} own goal — ${TEAMS[g.conceder].short}${g.ot?" (OT)":""}\n`
      :`- ⚽ ${mm2}:${ss2} ${g.name} (${TEAMS[g.scorer].short}) v ${TEAMS[g.conceder].short}${g.ot?" (OT)":""}\n`;
  });
  md+=`\n## Full play-by-play\n\n`+matchLog.map(l=>`- ${l}`).join("\n")+"\n";
  return md;
}
function downloadReport(){
  const md=buildMatchReport();

}

function resolveFullTime(){
  // rank by mode metric, tiebreak on goals scored (FIFA-style)
  const order=[0,1,2].sort(rankCmp);
  const leaders=[0,1,2].filter(t=>rankCmp(t,order[0])===0);
  if(leaders.length===1){ crownChampion(order[0],"at full time"); return; }
  // dead level at the top: golden-concession overtime
  phase="overtime";
  [0,1,2].filter(t=>!leaders.includes(t)).forEach(t=>{
    say(`Full time — ${tm(t)} are eliminated on the tiebreak.`,true);
    eliminateTeam(t);
  });
  otGolden=(aliveTeams().length===2);
  if(otGolden){
    say(`<span class="goal">FULL TIME — dead level!</span> ${tm(leaders[0])} v ${tm(leaders[1])}: golden goal, next score wins the title!`,true);
    showCelebration("#f7c948","⏱️ OVERTIME",

// ---------- Narrator (Web Speech API — built into the phone, works offline) ----------
let voiceOn=true, narrator=null, queuedUtter=0, welcomed=false;
const speechOK=("speechSynthesis" in window);
function pickVoice(){
  const vs=speechSynthesis.getVoices();
  narrator=vs.find(v=>v.lang==="en-GB")||vs.find(v=>v.lang&&v.lang.startsWith("en"))||vs[0]||null;
}
if(speechOK){ pickVoice(); speechSynthesis.onvoiceschanged=pickVoice; }
function speak(html,prio){
  if(!voiceOn||!speechOK)return;
  const text=html
    .replace(/<[^>]*>/g,"")
    .replace(/[\p{Extended_Pictographic}\u{FE0F}\u{200D}]/gu,"")
    .replace(/G+O+A+L+/gi,"goooooooooal")
    .replace(/GOOOAL!/g,"Goal!")
    .replace(/\+1/g,"plus one").replace(/−1/g,"minus one")
    .replace(/\+(\d+)s\b/g,"plus $1 seconds")
    .replace(/(\d+)s\b/g,"$1 seconds")
    .replace(/—/g,", ").trim();
  if(!text)return;
  // Armor: the Android speech engine is unstable under cancel/speak churn.
  // Whatever it does, it must NEVER take the football down with it.
  try{
    const mk=(txt)=>{
      const u=new SpeechSynthesisUtterance(txt);
      if(narrator)u.voice=narrator;
      u.rate=1.12; u.pitch=1;
      u.onend=u.onerror=()=>{
        queuedUtter=Math.max(0,queuedUtter-1); speakStartedAt=performance.now(); speakingPrio=null;
        if(highQ.length){                        // drain the big calls IN ORDER
          const nxt=highQ.shift();
          highLockUntil=performance.now()+2000;
          setTimeout(()=>{ try{
            queuedUtter++; speakStartedAt=performance.now(); speakingPrio="high";
            speechSynthesis.speak(mk(nxt));
          }catch(e6){ queuedUtter=0; speakingPrio=null; } },40);
        }
      };
      return u;
    };
    const fire=()=>{
      try{
        queuedUtter++; speakStartedAt=performance.now(); speakingPrio=prio;
        speechSynthesis.speak(mk(text));
      }catch(e2){ queuedUtter=0; speakingPrio=null; }
    };
    if(prio==="high"){
      const now2=performance.now();
      highLockUntil=now2+2000;   // the mic belongs to the big calls — chatter locked out
      if(speakingPrio==="high"||pendingHighFire||highQ.length){
        // a big call is playing or waiting: QUEUE IN ORDER, never clobber
        // (the old "latest wins" slot let a goal be replaced by its own follow-ups)
        if(highQ.length<4) highQ.push(text);
        return;
      }
      if(speechSynthesis.speaking||speechSynthesis.pending){
        // interrupting LOW speech: rate-limited cancel, then the Android defer
        if(now2-lastCancelAt>150){ speechSynthesis.cancel(); lastCancelAt=now2; }
        queuedUtter=0;
        pendingHighFire=setTimeout(()=>{ pendingHighFire=null; fire(); },90);
      } else { fire(); }

        a.g.setAttribute("transform",`translate(${B.x+B.ux*(-14+(p.seat%4)*14)},${B.y+B.uy*(-14+(p.seat%4)*14)}) scale(0.8)`);
        a.pip.setAttribute("fill","#e11d2e"); a.pip.setAttribute("opacity",1);
      } else a.g.setAttribute("opacity",0);
      return;
    }
    a.g.setAttribute("opacity",1);
    a.g.setAttribute("transform",`translate(${p.x},${p.y})`);
    a.nose.setAttribute("transform",`rotate(${(Math.atan2(p.hy,p.hx)*180/Math.PI).toFixed(1)})`);
    if(p.redCard){ a.pip.setAttribute("fill","#e11d2e"); a.pip.setAttribute("opacity",1); }
    else if(p.yellows>0){ a.pip.setAttribute("fill","#ffd166"); a.pip.setAttribute("opacity",1); }
    else a.pip.setAttribute("opacity",0);
    const frac=p.stamina;
    a.ring.setAttribute("stroke-dasharray",`${(frac*RING_C).toFixed(1)} ${RING_C.toFixed(1)}`);
    a.ring.setAttribute("stroke",frac>0.6?"#7ec97e":frac>0.35?"#ffb547":"#ff6b6b");
    const boosted=momentumOn&&clockSec<boostUntil[p.team];
    a.boost.setAttribute("opacity",boosted?0.7:0);
    if(boosted)a.boost.setAttribute("r",(20+2.2*Math.sin(clockSec*9+i)).toFixed(1));
  });
  // trail: only visible when the ball is moving fast (shots and long passes)
  trailPts.unshift({x:ball.x,y:ball.y,z:ball.z});
  if(trailPts.length>14)trailPts.pop();
  const bspd=Math.hypot(ball.vx,ball.vy);
  trailEls.forEach((c,i)=>{
    const pt=trailPts[Math.min((i+1)*2,trailPts.length-1)];
    c.setAttribute("cx",pt.x);c.setAttribute("cy",pt.y-(pt.z||0)*0.9);   // the tracer flies too
    c.setAttribute("opacity",(bspd>4.5||ball.z>3)?(0.4*(1-i/7)).toFixed(2):0);
  });
  const walker=players.find(q=>q.sentOff&&!q.out);
  if(walker){
    walkLabel.setAttribute("x",walker.x); walkLabel.setAttribute("y",walker.y-30);
    walkLabel.textContent=`🟥 ${walker.name}`;
    walkLabel.setAttribute("opacity",1);
  } else walkLabel.setAttribute("opacity",0);
  const lift=ball.z*0.9;
  ballEl.setAttribute("transform",`translate(${ball.x},${ball.y-lift})${ball.z>2?` scale(${(1+ball.z*0.022).toFixed(3)})`:""}`);
  ballShadow.setAttribute("cx",ball.x); ballShadow.setAttribute("cy",ball.y+3);
  ballShadow.setAttribute("r",(10-Math.min(6,ball.z*0.16)).toFixed(1));
  ballShadow.setAttribute("opacity",(0.3-Math.min(0.22,ball.z*0.007)).toFixed(2));
  // possession halo in the owner's color
  if(ball.owner){
    ballHalo.setAttribute("stroke",TEAMS[ball.owner.team].color);
    ballHalo.setAttribute("opacity",0.9);
  } else ballHalo.setAttribute("opacity",0);
  // floating event annotations
  for(let i=notes.length-1;i>=0;i--){
    const n=notes[i], age=(nowMs-n.t0)/2100;
    if(age>=1){ n.e.remove(); notes.splice(i,1); continue; }
    n.e.setAttribute("y",(n.y-30*age).toFixed(1));
    // hold at full strength for the first 45%, then fade out
    const op=age<0.45?0.95:0.95*(1-(age-0.45)/0.55);
    n.e.setAttribute("opacity",op.toFixed(2));
  }
  // expanding kick pings
  for(let i=pings.length-1;i>=0;i--){
    const pg=pings[i], age=(nowMs-pg.t0)/450;
    if(age>=1){ pg.e.remove(); pings.splice(i,1); continue; }
    pg.e.setAttribute("r",(10+age*70).toFixed(1));
    pg.e.setAttribute("opacity",(0.6*(1-age)).toFixed(2));
  }
  if(ball.owner){
    ownerLabel.setAttribute("x",ball.owner.x);
    ownerLabel.setAttribute("y",ball.owner.y-26);
    ownerLabel.textContent=(ball.owner.redCard?"🟥 ":ball.owner.yellows>0?"🟨 ":"")+ball.owner.name;
    ownerLabel.setAttribute("opacity",1);
  } else ownerLabel.setAttribute("opacity",0);
  // broadcast camera: pin to the carrier (their motion is smooth), only chase the raw
  // ball when it's genuinely loose; low-pass the target and ignore sub-10px jitter
  if(camMode==="free"){
    const vw=1120/zoomF, vh=1030/zoomF; lastVw=vw;
    const cx=Math.max(-110+vw/2,Math.min(1010-vw/2,camTX));
    const cy=Math.max(-110+vh/2,Math.min(920-vh/2,camTY));
    camTX=cx; camTY=cy; camX=cx; camY=cy;
    svg.setAttribute("viewBox",`${(cx-vw/2).toFixed(1)} ${(cy-vh/2).toFixed(1)} ${vw.toFixed(1)} ${vh.toFixed(1)}`);
    return;
  }
  if(zoom>1){
    if(camFocusP&&(camFocusP.out||performance.now()>=camFocusUntil)){ camFocusP=null; }
    const f=camFocusP
      ? {x:camFocusP.x, y:camFocusP.y}
      : ball.owner
      ? {x:ball.owner.x+ball.owner.vx*10, y:ball.owner.y+ball.owner.vy*10}
      : {x:ball.x+ball.vx*8, y:ball.y+ball.vy*8};
    camTX+=(f.x-camTX)*0.10; camTY+=(f.y-camTY)*0.10;
    const ddx=camTX-camX, ddy=camTY-camY, dd=Math.hypot(ddx,ddy);
    if(dd>0.1){
      const move=Math.max(0,dd-10)*(zoom>=3?0.12:0.07);   // soft deadband: micro-motion never pans
      camX+=ddx/dd*move; camY+=ddy/dd*move;
    }
    const vw=1120/zoom, vh=1030/zoom; lastVw=vw;
    const cx=Math.max(-110+vw/2,Math.min(1010-vw/2,camX));
    const cy=Math.max(-110+vh/2,Math.min(920-vh/2,camY));
    svg.setAttribute("viewBox",`${(cx-vw/2).toFixed(1)} ${(cy-vh/2).toFixed(1)} ${vw.toFixed(1)} ${vh.toFixed(1)}`);
  }
}

function outOfBounds(k,e){
  const toucher=ball.lastTouch;
  const ex=ball.x, ey=ball.y;
  ball.vx=0; ball.vy=0; ball.z=0; ball.zv=0; ball.owner=null; ball.noClaim=null; ball.isShot=false; ball.allyPass=false;
  addStoppage(0.8);
  if(e.goal){
    const ownerT=GOAL_EDGE.indexOf(k);
    if(toucher===ownerT && !out[ownerT]) stageCorner(ownerT,e,ex,ey);
    else if(!out[ownerT]) stageGoalKick(ownerT);
    else stageThrowIn(toucher,e,ex,ey);
  } else stageThrowIn(toucher,e,ex,ey);
}
function stageThrowIn(toucher,e,ex,ey){
  const sx=ex+e.nx*6, sy=ey+e.ny*6;   // he throws FROM the line, not from midfield
  const cands=players.filter(q=>q.team!==toucher&&q.role!=="K"&&!q.out&&!q.sentOff)
    .sort((a,b)=>dist(a,{x:sx,y:sy})-dist(b,{x:sx,y:sy}));
  const thr=cands[0];
  if(!thr){ ball.x=CX; ball.y=CY; return; }
  ball.owner=null; ball.x=sx; ball.y=sy;
  pendingRestart={p:thr, x:sx, y:sy, team:thr.team, cap:performance.now()+2000};
  suppress={team:toucher,until:clockSec+0.8};
  spawnNote(sx,sy-24,"throw-in!",TEAMS[thr.team].color,TEAMS[thr.team].accent);
  if(Math.random()<0.4) say(pick([
    `Out of play — throw-in ${tm(thr.team)}, quickly taken.`,
    `Into touch. ${thr.name} hurls it back in for ${tm(thr.team)}.`,
    `${tm(thr.team)} with the throw — no time wasted.`,
    `Over the line! ${thr.name} takes it quickly.`]));
  restartHold=performance.now()+2200;   // shortened the moment the taker arrives
}
function stageGoalKick(t){
  const gk=players.find(q=>q.team===t&&q.role==="K"&&!q.out);
  if(!gk){ ball.x=CX; ball.y=CY; return; }
  ball.owner=gk; ball.lastTouch=t; ball.lastKicker=gk;
  ball.x=gk.x; ball.y=gk.y; ball.touchT=0.4;
  spawnNote(gk.x,gk.y-24,"goal kick",TEAMS[t].color,TEAMS[t].accent);
  if(Math.random()<0.35) say(pick([
    `Behind for a goal kick — ${tm(t)} restart.`,
    `${gk.name} places it for the goal kick. Deep breath.`,
    `Nothing doing — goal kick ${tm(t)}.`,
    `All the way through for a goal kick. ${gk.name} resets the board.`]));
  restartHold=performance.now()+650;
}
function stageCorner(ownerT,e,ex,ey){
  const alive=[0,1,2].filter(x=>x!==ownerT&&!out[x]);
  const att=alive.find(x=>targets[x]===ownerT)??alive[0];
  if(att===undefined){ ball.x=CX; ball.y=CY; return; }
  const vtx=dist({x:e.p1.x,y:e.p1.y},{x:ex,y:ey})<dist({x:e.p2.x,y:e.p2.y},{x:ex,y:ey})?e.p1:e.p2;
  const taker=players.filter(q=>q.team===att&&q.role!=="K"&&!q.out&&!q.sentOff)
    .sort((a,b)=>dist(a,vtx)-dist(b,vtx))[0];
  if(!taker){ stageGoalKick(ownerT); return; }
  const cx2=vtx.x+e.nx*14, cy2=vtx.y+e.ny*14;
  ball.owner=null; ball.x=cx2; ball.y=cy2;
  pendingRestart={p:taker, x:cx2, y:cy2, team:att, cap:performance.now()+2400};
  cornerTaker=taker; cornerGoal=ownerT;
  spawnNote(taker.x,taker.y-26,"corner!",TEAMS[att].color,TEAMS[att].accent);
  say(pick([
    `<b style="color:${TEAMS[att].color}">Corner to ${tm(att)}</b> — ${taker.name} to swing it in...`,
    `<b style="color:${TEAMS[att].color}">Corner ${tm(att)}!</b> Big bodies forward... ${taker.name} over the flag.`,
    `<b style="color:${TEAMS[att].color}">Corner to ${tm(att)}</b> — the box fills. ${taker.name} whips it...`,
    `<b style="color:${TEAMS[att].color}">Corner!</b> ${taker.name} raises an arm... here it comes...`]),true);
  restartHold=performance.now()+2600;   // shortened once he's over the ball
}

function stagePenalty(){
  const pen=pendingPenalty; pendingPenalty=null;
  const shooter=pen.shooter, conceder=pen.conceder;
  if(out[conceder]||shooter.out) return;
  const e=EDGES[GOAL_EDGE[conceder]], g=goalCenter(conceder);
  const sx=g.x+e.nx*110, sy=g.y+e.ny*110;
  ball.owner=shooter; ball.lastTouch=shooter.team; ball.lastKicker=shooter;
  ball.x=sx; ball.y=sy; ball.vx=0; ball.vy=0; ball.z=0; ball.zv=0;
  ball.touchT=99;   // no dribble touches during the run-up
  shooter.x=sx+e.nx*16; shooter.y=sy+e.ny*16; shooter.vx=0; shooter.vy=0;
  const gk=players.find(q=>q.team===conceder&&q.role==="K"&&!q.out);
  if(gk){ gk.x=g.x+e.nx*12; gk.y=g.y+e.ny*12; gk.vx=0; gk.vy=0; }
  players.forEach(q=>{ if(q===shooter||q===gk||q.out)return;
    const d=dist(q,g)||1;
    if(d<170){ q.x=g.x+(q.x-g.x)/d*178; q.y=g.y+(q.y-g.y)/d*178; }});
  penaltyShooter=shooter; penaltyGoalTeam=conceder;
  spawnNote(sx,sy-28,"PENALTY!","#ffd166");
  say(pick([
    `${shooter.name} places the ball on the spot... the keeper crouches...`,
    `${shooter.name} steps up. The stadium holds its breath...`,
    `Twelve yards between ${shooter.name} and glory. The keeper waits...`,
    `${shooter.name} takes a long breath and starts the run-up...`]),true);
  resumeAt=performance.now()+1000;
}

// ---------- Loop ----------
let last=performance.now();
function loop(now){
  const dt=Math.min(0.05,(now-last)/1000); last=now;
  if(running){
    if(now<celebrateUntil){
      updateBars();               // frozen frame while we celebrate
    } else {
      if(pendingKickoff!==null){ hideCelebration(); kickoff(pendingKickoff); pendingKickoff=null;
        resumeAt=performance.now()+1200; }   // beat of stillness before play resumes
      else if(celebrateUntil>0&&celebrateUntil!==Infinity){
        hideCelebration();
        if(walkPending){ walkOff=walkPending; walkPending=null; }
        else if(pendingPenalty){ stagePenalty(); } else resumeAt=performance.now()+350;
      }
      if(walkOff){
        // the walk of shame owns the stage: play holds, camera escorts him to the bench
        const q=walkOff, B=benchPos[q.team];
        const bdx=B.x-q.x, bdy=B.y-q.y, bd=Math.hypot(bdx,bdy)||1;
        q.x+=bdx/bd*1.5*dt*60; q.y+=bdy/bd*1.5*dt*60; q.vx=0; q.vy=0;
        if(ball.owner===q) ball.owner=null;
        camFocusP=q; camFocusUntil=performance.now()+400;
        resumeAt=performance.now()+120;
        if(bd<12){
          q.out=true; q.sentOff=false; walkOff=null; camFocusP=null;
          q.benched=true;
          q.seat=players.filter(o=>o.team===q.team&&o.benched).length-1;
          say(pick([
            `${q.name} takes his seat on the bench, head in hands. ${tm(q.team)} regroup a man light.`,
            `${q.name} sits down in the dugout and studies his boots. ${tm(q.team)} play on without him.`,
            `A towel over the head for ${q.name}. The bench is a lonely place tonight.`,
            `${q.name} takes the long seat. His teammates don't look over.`,
            `Down he sits — ${q.name}'s evening is over, and he knows exactly whose fault it is.`]));
          if(fieldersLeft(q.team)===0)
            say(`${tm(q.team)} are down to just the goalkeeper. He abandons his line — needs must.`,true);
          if([0,1,2].every(tt=>out[tt]||fieldersLeft(tt)===0))
            say(`<b>Scenes. Three goalkeepers enter. One lifts the cup.</b>`,true);
          if(pendingPenalty) stagePenalty(); else resumeAt=performance.now()+400;
        }
      }
      if(phase==="regulation"){
        if(!stoppageAnnounced&&clockSec>=matchLen){
          stoppageAnnounced=true;
          say(`📋 The fourth official's board goes up: <b>+${Math.ceil(stoppageLen)}s</b> added on!`,true);
        }
        if(clockSec>=matchLen+stoppageLen) resolveFullTime();
      }
      if(phase!=="over" && now>=resumeAt && menuTeam===null){
        const step=dt*speed*0.75;   // baseline pace rebalance: old 0.75x is the new 1x
        clockSec+=step;
        retargetTimer+=step;
        if(retargetTimer>6){retargetTimer=0;computeTargets();}
        think(step); physics(step); colorCommentary();

      }
      const m=Math.floor(clockSec/60), ss=String(Math.floor(clockSec%60)).padStart(2,"0");
      document.getElementById("clock").textContent=
        phase==="overtime"?`OT ${m}:${ss}`
        :phase==="over"?"FT"
        :clockSec>matchLen?`${Math.floor(matchLen/60)}:00 +${Math.floor(clockSec-matchLen)}s`
        :`${m}:${ss}/${Math.floor(matchLen/60)}:00`;
      updateBars(); draw();
    }
  }
  requestAnimationFrame(loop);
}

// ---------- Camera ----------
let zoom=2.3, camX=CX, camY=CY, camTX=CX, camTY=CY;
let camMode="follow", zoomF=2.3, lastVw=1120/2.3;
const ZOOMS=[1,1.6,2.3,3.5];
// ---- pinch to zoom & swipe to pan; the zoom button returns the camera to the ball ----
{
  const ptrs=new Map(); let pinchD=0;
  const zv=document.getElementById("zoomVal");
  const enterFree=()=>{ if(camMode!=="free"){ camMode="free"; zoomF=zoom>1?zoom:1.4; zv.textContent="◉"; } };
  svg.style.touchAction="none";
  svg.addEventListener("pointerdown",e=>{
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===2){ const a=[...ptrs.values()]; pinchD=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y); }
  });
  svg.addEventListener("pointermove",e=>{
    if(!ptrs.has(e.pointerId))return;
    e.preventDefault();
    const r=svg.getBoundingClientRect(), wpp=lastVw/Math.max(1,r.width);
    const prev=ptrs.get(e.pointerId);
    ptrs.set(e.pointerId,{x:e.clientX,y:e.clientY});
    if(ptrs.size===1){
      enterFree();
      camTX-=(e.clientX-prev.x)*wpp; camTY-=(e.clientY-prev.y)*wpp;
      camX=camTX; camY=camTY;
    } else if(ptrs.size===2){
      enterFree();
      const a=[...ptrs.values()];
      const nd=Math.hypot(a[0].x-a[1].x,a[0].y-a[1].y);
      if(pinchD>0) zoomF=Math.max(1,Math.min(5.5,zoomF*nd/pinchD));
      pinchD=nd;
    }
  },{passive:false});
  const drop=e=>{ ptrs.delete(e.pointerId); pinchD=0; };
  svg.addEventListener("pointerup",drop); svg.addEventListener("pointercancel",drop);
  svg.addEventListener("wheel",e=>{ e.preventDefault(); enterFree();
    zoomF=Math.max(1,Math.min(5.5,zoomF*(e.deltaY<0?1.1:0.9))); },{passive:false});
}
document.getElementById("btnZoom").onclick=e=>{
  if(camMode==="free"){
    camMode="follow";                       // back to the ball
    document.getElementById("zoomVal").textContent=zoom===1?"1×":zoom+"×";
    camX=camTX=CX; camY=camTY=CY;
    if(zoom===1) svg.setAttribute("viewBox","-110 -110 1120 1030");
    return;
  }
  const i=(ZOOMS.indexOf(zoom)+1)%ZOOMS.length;
  zoom=ZOOMS[i];
  document.getElementById("zoomVal").textContent=zoom+"×";
  if(zoom===1) svg.setAttribute("viewBox","-110 -110 1120 1030");
  else { camX=camTX=ball.x; camY=camTY=ball.y; }   // start on the action
  draw();                              // apply immediately, even while paused
};

}
function cardTap(t){
  if(activeCoach!==null && t!==activeCoach && !out[t] && coached[activeCoach] && !out[activeCoach]){
    coachTarget[activeCoach]=t;

  }
}

// ---------- Match setup dialog ----------

function startCountdown(){

  const el2=document.getElementById("countdown");
  el2.classList.add("show");
  const steps=["3","2","1","GO!"];
  steps.forEach((t2,i)=>setTimeout(()=>{
